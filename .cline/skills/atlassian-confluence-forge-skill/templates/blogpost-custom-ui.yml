# Example Menu Item Implementation

```jsx
// src/blogpost-menu-item.jsx
import React from 'react';
import { route, api } from '@forge/bridge';

export default function BlogPostAction() {
  const handleCustomAction = async () => {
    try {
      // Get current blog post context
      const pageId = AP.context.getPageId();
      
      if (!pageId) {
        console.log('No page ID available');
        return;
      }

      // Perform your custom action here
      await api.requestConfluence(
        route`/wiki/api/v2/blogposts/${pageId}/properties/myapp:action`,
        { 
          method: 'PUT',
          body: JSON.stringify({ value: 'processed' })
        }
      );

      console.log('Action completed successfully');
    } catch (error) {
      console.error('Action failed:', error);
    }
  };

  return (
    <div>
      <button onClick={handleCustomAction}>
        {{ACTION_TITLE}}
      </button>
    </div>
  );
}
```

---
# Usage Notes

1. Replace `{{APP_KEY}}` with your app's unique key
2. Replace `{{EXTENSION_TITLE}}` or `{{ACTION_TITLE}}` with display titles
3. Create src/blogpost-custom-ui.jsx or src/blogpost-menu-item.jsx with your React component
4. Deploy: forge deploy --verbose

# Notes

- Blog post extensions work the same way as page extensions
- Use `pageBanner` module for banners on blog posts (it supports both pages and blog posts)
- Use `contentAction` module for menu items in "more actions" dropdown
- The `displayConditions.pageTypes` array can include 'blogpost' to target blog posts specifically