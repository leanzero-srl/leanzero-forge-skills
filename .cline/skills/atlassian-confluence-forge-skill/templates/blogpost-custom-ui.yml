# Blog Post Custom UI Module Template
# Add custom React components to Confluence blog posts
# Location: https://developer.atlassian.com/cloud/confluence/modules/

modules:
  # Option 1: Banner on blog posts (appears at top)
  confluence:pageBanner:
    - key: {{APP_KEY}}-blogpost-banner
      resource: main
      title: {{EXTENSION_TITLE}}
      displayConditions:
        pageTypes:
          - blogpost
          
  resources:
    - key: main
      path: src/blogpost-custom-ui.jsx
      
---
# Option 2: Menu item in "more actions" (•••) for blog posts

modules:
  confluence:contentAction:
    - key: {{APP_KEY}}-blogpost-action
      resource: main
      title: {{ACTION_TITLE}}
      icon: icon.png
      displayConditions:
        pageTypes:
          - blogpost
          
  resources:
    - key: main
      path: src/blogpost-menu-item.jsx
      
---
# Example React Component for Blog Post Extension

```jsx
// src/blogpost-custom-ui.jsx
import React, { useEffect, useState } from 'react';
import { route, api } from '@forge/bridge';

export default function BlogPostExtension() {
  const [blogPost, setBlogPost] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function fetchBlogPostData() {
      try {
        // Get current blog post ID from route
        const routeInfo = await routeHandlers.getCurrentRoute();
        
        // Parse blog post ID from URL
        let blogpostId = null;
        const match = routeInfo.path.match(/\/blogpost\/(\d+)/);
        if (match) {
          blogpostId = match[1];
        }
        
        if (!blogpostId) return;

        // Fetch blog post details using requestConfluence
        const response = await api.requestConfluence(
          route`/wiki/api/v2/blogposts/${blogpostId}`
        );

        if (response.ok) {
          const data = await response.json();
          setBlogPost(data);
        }
      } catch (error) {
        console.error('Failed to fetch blog post:', error);
      } finally {
        setLoading(false);
      }
    }

    // Small delay to ensure route context is ready
    setTimeout(fetchBlogPostData, 200);
  }, []);

  if (loading) {
    return <div>Loading blog post data...</div>;
  }

  if (!blogPost) {
    return <div>Unable to load blog post</div>;
  }

  return (
    <div className="blogpost-extension">
      <h3>{blogPost.title}</h3>
      <p>Last modified: {new Date(blogPost.lastModified).toLocaleDateString()}</p>
      
      {/* Your custom UI here */}
      <button onClick={() => console.log('Custom action!')}>
        Custom Action
      </button>
    </div>
  );
}
```

