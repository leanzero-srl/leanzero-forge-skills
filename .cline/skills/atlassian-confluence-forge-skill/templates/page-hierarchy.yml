# Hierarchy Navigation UI Component

```jsx
// src/components/HierarchyNav.jsx
import React, { useState, useEffect } from 'react';
import { route } from '@forge/api';
import { requestConfluence } from '@forge/bridge';

export default function HierarchyNav({ pageId }) {
  const [ancestors, setAncestors] = useState([]);
  const [children, setChildren] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function loadHierarchy() {
      try {
        // Load ancestors (breadcrumbs)
        const ancestorResponse = await requestConfluence(
          route`/wiki/api/v2/pages/${pageId}?expand=ancestors`
        );

        if (ancestorResponse.ok) {
          const ancestorData = await ancestorResponse.json();
          setAncestors(ancestorData.ancestors || []);
        }

        // Load children
        const childrenResponse = await requestConfluence(
          route`/wiki/api/v2/search?cql=type=page%20AND%20parent=${pageId}&limit=50`
        );

        if (childrenResponse.ok) {
          const childrenData = await childrenResponse.json();
          setChildren(childrenData.results || []);
        }
      } catch (error) {
        console.error('Failed to load hierarchy:', error);
      } finally {
        setLoading(false);
      }
    }

    loadHierarchy();
  }, [pageId]);

  if (loading) {
    return <div>Loading navigation...</div>;
  }

  return (
    <div className="hierarchy-nav">
      {/* Ancestors / Breadcrumbs */}
      {ancestors.length > 0 && (
        <nav style={{ marginBottom: '16px' }}>
          <strong>Breadcrumb:</strong>
          <ol style={{
            display: 'flex',
            flexWrap: 'wrap',
            gap: '4px 8px',
            listStyle: 'none',
            padding: 0,
            margin: '4px 0'
          }}>
            {ancestors.map((ancestor, index) => (
              <li key={index}>
                <a href={`/wiki/spaces/${ancestor.spaceKey}/pages/${ancestor.id}`}>
                  {ancestor.title}
                </a>
                {index < ancestors.length - 1 && <span>/</span>}
              </li>
            ))}
          </ol>
        </nav>
      )}

      {/* Children / Subpages */}
      {children.length > 0 && (
        <div className="subpages">
          <h4>Subpages ({children.length})</h4>
          
          <ul style={{ padding: '0 20px' }}>
            {children.map(child => (
              <li key={child.id}>
                <a href={`/wiki/spaces/${child.spaceKey}/pages/${child.id}`}>
                  {child.title}
                </a>
              </li>
            ))}
          </ul>
        </div>
      )}

      {/* Parent link (if this is a child) */}
      {ancestors.length > 0 && (
        <div style={{ marginTop: '16px' }}>
          <a href={`/wiki/spaces/${ancestors[ancestors.length - 1].spaceKey}/pages/${ancestors[ancestors.length - 1].id}`}>
            ← Up to parent
          </a>
        </div>
      )}
    </div>
  );
}
```

