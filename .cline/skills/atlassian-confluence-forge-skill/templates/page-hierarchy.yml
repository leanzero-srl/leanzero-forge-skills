# Recursive Page List with Expand/Collapse

```jsx
// src/components/ExpandablePageList.jsx
import React, { useState } from 'react';
import { requestConfluence } from '@forge/bridge';

export default function ExpandablePageList({ parentId = null }) {
  const [expanded, setExpanded] = useState({});
  const [children, setChildren] = useState(null);

  useEffect(() => {
    async function loadChildren() {
      let response;
      
      if (parentId) {
        response = await requestConfluence(
          `/wiki/api/v2/search?cql=type=page%20AND%20parent=${parentId}&limit=50`
        );
      } else {
        const spaceKey = AP.context.getSpaceKey();
        response = await requestConfluence(
          `/wiki/api/v2/search?cql=type=page%20AND%20space="${spaceKey}"&limit=50`
        );
      }

      if (response.ok) {
        setChildren(await response.json());
      }
    }

    loadChildren();
  }, [parentId]);

  const toggleExpand = () => {
    if (!children) return;
    
    setExpanded(prev => ({
      ...prev,
      [parentId]: !prev[parentId]
    }));
  };

  const hasChildren = children?.total > 0;

  return (
    <div>
      <div 
        style={{ cursor: 'pointer', fontWeight: 'bold' }}
        onClick={toggleExpand}
      >
        {hasChildren && (
          <span style={{ marginRight: '8px' }}>
            {expanded[parentId] ? '▼' : '▶'}
          </span>
        )}
        
        {parentId 
          ? children?.results?.find(c => c.id === parentId)?.title || 'Loading...'
          : 'All Pages'
        }
      </div>

      {hasChildren && expanded[parentId] && (
        <div style={{ paddingLeft: '20px' }}>
          <ul>
            {children.results.map(child => (
              <li key={child.id}>
                <a href={`/wiki/spaces/${child.spaceKey}/pages/${child.id}`}>
                  {child.title}
                </a>
                
                {/* Recursive nested list */}
                <ExpandablePageList parentId={child.id} />
              </li>
            ))}
          </ul>
        </div>
      )}
    </div>
  );
}
```

