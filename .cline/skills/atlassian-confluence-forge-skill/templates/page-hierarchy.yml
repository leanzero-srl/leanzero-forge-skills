# Page Tree Display Component

```jsx
// src/components/PageTree.jsx
import React, { useState } from 'react';
import { requestConfluence } from '@forge/bridge';

export function PageTree({ parentId = null, level = 0 }) {
  const [children, setChildren] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function loadChildren() {
      try {
        let response;
        
        if (parentId) {
          // Get direct children
          response = await requestConfluence(
            `/wiki/api/v2/search?cql=type=page%20AND%20parent=${parentId}&limit=50`
          );
        } else {
          // Get root pages in current space
          const spaceKey = AP.context.getSpaceKey();
          response = await requestConfluence(
            `/wiki/api/v2/search?cql=type=page%20AND%20space="${spaceKey}"&limit=50`
          );
        }

        if (response.ok) {
          const data = await response.json();
          setChildren(data.results || []);
        }
      } catch (error) {
        console.error('Failed to load page tree:', error);
      } finally {
        setLoading(false);
      }
    }

    loadChildren();
  }, [parentId]);

  if (loading) return <div>Loading...</div>;

  return (
    <ul style={{ paddingLeft: `${level * 20}px` }}>
      {children.map(child => (
        <li key={child.id}>
          <a href={`/wiki/spaces/${child.spaceKey}/pages/${child.id}`}>
            {child.title}
          </a>
          
          {/* Recursive call for nested children */}
          <PageTree parentId={child.id} level={level + 1} />
        </li>
      ))}
    </ul>
  );
}

// Usage
<PageTree />  // Show all pages in space
<PageTree parentId={pageId} />  // Show children of specific page
```

