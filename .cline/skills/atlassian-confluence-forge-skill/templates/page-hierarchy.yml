# Page Hierarchy Navigation Template
# Navigate parent-child relationships between Confluence pages
# Documentation: https://developer.atlassian.com/cloud/confluence/rest/api-group-page/

modules:
  # Add navigation to page header or sidebar
  confluence:pageBanner:
    - key: {{APP_KEY}}-hierarchy-nav
      resource: main
      title: "Page Hierarchy"
      
  resources:
    - key: main
      path: src/hierarchy.jsx

permissions:
  scopes:
    - read:confluence-content.summary

---
# Page Hierarchy API Operations

## Get Parent Page

```javascript
// src/utils/hierarchy.js
import { route } from '@forge/api';
import { requestConfluence } from '@forge/bridge';

export async function getParentPage(pageId) {
  try {
    const response = await requestConfluence(
      route`/wiki/api/v2/pages/${pageId}?expand=ancestors`
    );

    if (!response.ok) return null;

    const data = await response.json();
    
    // Ancestors array contains parent at index 0
    if (data.ancestors && data.ancestors.length > 0) {
      return data.ancestors[data.ancestors.length - 1]; // Direct parent
    }
    
    return null; // No parent (root page)
  } catch (error) {
    console.error('Error getting parent:', error);
    throw error;
  }
}

// Usage
const parent = await getParentPage(pageId);
if (parent) {
  console.log(`Parent: ${parent.title}`);
}
```

## Get Children Pages

```javascript
export async function getChildrenPages(parentId, options = {}) {
  const { start = 0, limit = 25 } = options;

  try {
    // Use CQL to find children of this page
    const response = await requestConfluence(
      route`/wiki/api/v2/search?cql=type=page%20AND%20parent=${parentId}&start=${start}&limit=${limit}`
    );

    if (!response.ok) return null;

    const data = await response.json();
    
    return {
      children: data.results || [],
      total: data.total,
      start: data.start,
      limit: data.limit
    };
  } catch (error) {
    console.error('Error getting children:', error);
    throw error;
  }
}

// Usage - Get direct children
const result = await getChildrenPages(pageId);
console.log(`${result.children.length} children found`);
```

## Get Sibling Pages

```javascript
export async function getSiblingPages(pageId) {
  try {
    // First get the parent to find siblings
    const parentResponse = await requestConfluence(
      route`/wiki/api/v2/pages/${pageId}?expand=ancestors`
    );

    if (!parentResponse.ok) return [];

    const pageData = await parentResponse.json();
    
    if (!pageData.ancestors || pageData.ancestors.length === 0) {
      // This is a root page - get all pages in same space
      const spaceKey = AP.context.getSpaceKey();
      
      const response = await requestConfluence(
        route`/wiki/api/v2/search?cql=type=page%20AND%20space="${spaceKey}"%20AND%20id!=${pageId}&limit=100`
      );

      if (!response.ok) return [];

      const data = await response.json();
      return data.results || [];
    }

    // Get children of the parent (which includes current page)
    const parentId = pageData.ancestors[pageData.ancestors.length - 1].id;
    
    const childrenResponse = await requestConfluence(
      route`/wiki/api/v2/search?cql=type=page%20AND%20parent=${parentId}`
    );

    if (!childrenResponse.ok) return [];

    const childrenData = await childrenResponse.json();
    
    // Filter out current page
    return (childrenData.results || []).filter(c => c.id !== pageId);
  } catch (error) {
    console.error('Error getting siblings:', error);
    throw error;
  }
}

// Usage
const siblings = await getSiblingPages(pageId);
```

## Get Ancestor Pages (Breadcrumbs)

```javascript
export async function getAncestors(pageId) {
  try {
    const response = await requestConfluence(
      route`/wiki/api/v2/pages/${pageId}?expand=ancestors`
    );

    if (!response.ok) return [];

    const data = await response.json();
    
    // Ancestors are ordered from oldest to newest
    return data.ancestors || [];
  } catch (error) {
    console.error('Error getting ancestors:', error);
    throw error;
  }
}

// Usage in React component:
function Breadcrumbs({ pageId }) {
  const [ancestors, setAncestors] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function loadBreadcrumbs() {
      try {
        const ancestorsData = await getAncestors(pageId);
        
        // Add current page to the end
        const response = await requestConfluence(
          route`/wiki/api/v2/pages/${pageId}?expand=title`
        );
        
        if (response.ok) {
          const currentPage = await response.json();
          setAncestors([...ancestorsData, currentPage]);
        }
      } catch (error) {
        console.error('Failed to load breadcrumbs:', error);
      } finally {
        setLoading(false);
      }
    }

    loadBreadcrumbs();
  }, [pageId]);

  if (loading) return <span>Loading...</span>;

  return (
    <nav style={{ marginBottom: '16px' }}>
      <ol style={{ display: 'flex', gap: '8px', fontSize: '14px' }}>
        {ancestors.map((ancestor, index) => (
          <li key={index} style={{ listStyle: 'none' }}>
            <a href={`/wiki/spaces/${ancestor.spaceKey}/pages/${ancestor.id}`}>
              {ancestor.title}
            </a>
            {index < ancestors.length - 1 && <span>/</span>}
          </li>
        ))}
      </ol>
    </nav>
  );
}
```

## Get Descendants (All Nested Pages)

```javascript
export async function getAllDescendants(parentId, options = {}) {
  const { limit = 50 } = options;
  
  const allDescendants = [];
  let cursor = null;

  do {
    // Use search with recursive CQL
    const response = await requestConfluence(
      route`/wiki/api/v2/search?cql=type=page%20AND%20parent=${parentId}&limit=${limit}`
    );

    if (!response.ok) break;

    const data = await response.json();
    
    allDescendants.push(...(data.results || []));
    
    // Continue until no more results
    if (data.results.length < limit) {
      break;
    }
  } while (true);

  return allDescendants;
}

// Usage - Get all pages in a section
const allPages = await getAllDescendants(sectionPageId);
console.log(`${allPages.length} pages in this section`);
```

