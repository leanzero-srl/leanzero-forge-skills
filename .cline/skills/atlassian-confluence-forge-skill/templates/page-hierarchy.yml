# Quick Links Between Related Pages

```jsx
// src/components/QuickLinks.jsx
import React, { useState, useEffect } from 'react';
import { requestConfluence } from '@forge/bridge';

export default function QuickLinks({ pageId }) {
  const [links, setLinks] = useState(null);

  useEffect(() => {
    async function loadLinks() {
      try {
        // Get current page info
        const currentPageResponse = await requestConfluence(
          `/wiki/api/v2/pages/${pageId}?expand=ancestors`
        );

        if (!currentPageResponse.ok) return;

        const currentPage = await currentPageResponse.json();
        
        // Find parent (if exists)
        let parentPage = null;
        if (currentPage.ancestors && currentPage.ancestors.length > 0) {
          const parentId = currentPage.ancestors[currentPage.ancestors.length - 1].id;
          
          const parentResponse = await requestConfluence(
            `/wiki/api/v2/pages/${parentId}?expand=title`
          );
          
          if (parentResponse.ok) {
            parentPage = await parentResponse.json();
          }
        }

        // Find sibling pages
        let siblingPages = [];
        if (currentPage.ancestors?.length > 0) {
          const parentId = currentPage.ancestors[currentPage.ancestors.length - 1].id;
          
          const siblingsResponse = await requestConfluence(
            `/wiki/api/v2/search?cql=type=page%20AND%20parent=${parentId}&limit=10`
          );
          
          if (siblingsResponse.ok) {
            const data = await siblingsResponse.json();
            siblingPages = (data.results || []).filter(p => p.id !== pageId);
          }
        }

        setLinks({ parentPage, siblingPages });
      } catch (error) {
        console.error('Failed to load links:', error);
      }
    }

    loadLinks();
  }, [pageId]);

  if (!links) return <div>Loading...</div>;

  return (
    <div className="quick-links">
      {links.parentPage && (
        <div style={{ marginBottom: '16px' }}>
          <strong>Parent:</strong>{' '}
          <a href={`/wiki/spaces/${links.parentPage.spaceKey}/pages/${links.parentPage.id}`}>
            {links.parentPage.title}
          </a>
        </div>
      )}

      {links.siblingPages.length > 0 && (
        <div>
          <strong>Siblings:</strong>
          <ul style={{ margin: '8px 0', paddingLeft: '20px' }}>
            {links.siblingPages.map(page => (
              <li key={page.id}>
                <a href={`/wiki/spaces/${page.spaceKey}/pages/${page.id}`}>
                  {page.title}
                </a>
              </li>
            ))}
          </ul>
        </div>
      )}
    </div>
  );
}