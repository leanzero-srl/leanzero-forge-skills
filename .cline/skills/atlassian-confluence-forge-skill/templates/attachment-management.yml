# Attachment UI Components

## Simple Attachment List

```jsx
// src/components/AttachmentList.jsx
import React, { useState, useEffect } from 'react';
import { listAttachments, downloadAttachment } from '../utils/attachments';

export default function AttachmentList({ pageId }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function loadAttachments() {
      try {
        const result = await listAttachments(pageId);
        setData(result);
      } catch (error) {
        console.error('Failed to load attachments:', error);
      } finally {
        setLoading(false);
      }
    }

    if (pageId) {
      loadAttachments();
    }
  }, [pageId]);

  if (loading) return <div>Loading...</div>;

  return (
    <div className="attachment-list">
      {data.attachments.length === 0 && (
        <p>No attachments yet.</p>
      )}

      <ul style={{ listStyle: 'none', padding: 0 }}>
        {data.attachments.map(attachment => {
          const isImage = attachment.mediaType?.startsWith('image/');
          
          return (
            <li 
              key={attachment.id}
              style={{
                padding: '8px',
                marginBottom: '4px',
                backgroundColor: '#f3f2f1',
                borderRadius: '4px'
              }}
            >
              <div style={{ display: 'flex', alignItems: 'center' }}>
                {isImage ? (
                  <img 
                    src={attachment.mediaThumbUrl} 
                    alt="Thumbnail"
                    style={{
                      width: '40px',
                      height: '40px',
                      marginRight: '8px',
                      borderRadius: '2px'
                    }}
                  />
                ) : (
                  <span style={{ fontSize: '16px', marginRight: '8px' }}>
                    📎
                  </span>
                )}

                <div style={{ flex: 1 }}>
                  <strong>{attachment.title}</strong>
                  <p style={{
                    fontSize: '12px',
                    margin: '2px 0',
                    color: '#6b7280'
                  }}>
                    {Math.round(attachment.fileSize / 1024)} KB
                  </p>
                </div>

                <button
                  onClick={() => downloadAttachment(
                    attachment.id,
                    attachment.title
                  )}
                  style={{
                    padding: '4px 8px',
                    fontSize: '12px'
                  }}
                >
                  Download
                </button>
              </div>
            </li>
          );
        })}
      </ul>

      {data.total > data.size && (
        <p>
          Showing {data.attachments.length} of {data.total} attachments
        </p>
      )}
    </div>
  );
}
```

## Attachment Upload Component

```jsx
// src/components/AttachmentUpload.jsx
import React, { useState } from 'react';
import { uploadAttachment } from '../utils/attachments';

export default function AttachmentUpload({ pageId }) {
  const [file, setFile] = useState(null);
  const [comment, setComment] = useState('');
  const [uploading, setUploading] = useState(false);

  const handleFileSelect = (e) => {
    if (e.target.files.length > 0) {
      setFile(e.target.files[0]);
    }
  };

  const handleSubmit = async () => {
    if (!file) return;

    setUploading(true);

    try {
      await uploadAttachment(pageId, file, { comment });
      
      // Reset form
      setFile(null);
      setComment('');
      
      alert('Attachment uploaded successfully!');
      
      // Optionally trigger a refresh of the attachment list
      window.dispatchEvent(new Event('attachments-updated'));
    } catch (error) {
      alert(`Failed to upload: ${error.message}`);
    } finally {
      setUploading(false);
    }
  };

  return (
    <div className="attachment-upload">
      <h4>Upload Attachment</h4>
      
      <input
        type="file"
        onChange={handleFileSelect}
        style={{ marginBottom: '8px' }}
      />

      {file && (
        <p style={{ fontSize: '12px', color: '#6b7280' }}>
          Selected: {file.name} ({Math.round(file.size / 1024)} KB)
        </p>
      )}

      <textarea
        placeholder="Attachment comment (optional)"
        value={comment}
        onChange={(e) => setComment(e.target.value)}
        style={{ width: '100%', marginBottom: '8px' }}
      />

      <button
        onClick={handleSubmit}
        disabled={!file || uploading}
        style={{
          padding: '8px 16px',
          cursor: !file || uploading ? 'not-allowed' : 'pointer'
        }}
      >
        {uploading ? 'Uploading...' : 'Upload'}
      </button>
    </div>
  );
}
```

