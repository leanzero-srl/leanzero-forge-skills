# Attachment Helper Class

```javascript
// src/utils/attachmentStore.js
import { route } from '@forge/api';
import { requestConfluence } from '@forge/bridge';

export class AttachmentStore {
  constructor() {}

  async _getAttachments(pageId, options = {}) {
    const { start = 0, limit = 25, expand = 'mediaThumbUrl' } = options;

    const response = await requestConfluence(
      route`/wiki/api/v2/pages/${pageId}/attachments?start=${start}&limit=${limit}&expand=${expand}`
    );

    if (!response.ok) return null;

    const data = await response.json();
    return {
      attachments: data.results || [],
      start: data.start,
      limit: data.limit,
      size: data.size,
      total: data.total
    };
  }

  async getAll(pageId) {
    let start = 0;
    const allAttachments = [];

    do {
      const result = await this._getAttachments(pageId, { start, limit: 100 });
      if (!result || !result.attachments) break;

      allAttachments.push(...(result.attachments || []));
      
      if (result.size < result.limit) break;
      start += result.limit;
    } while (true);

    return allAttachments;
  }

  async getImages(pageId) {
    const all = await this.getAll(pageId);
    return all.filter(a => a.mediaType?.startsWith('image/'));
  }

  async getFileByName(pageId, fileName) {
    const all = await this.getAll(pageId);
    return all.find(
      a => a.title === fileName || a.downloadUrl?.includes(fileName)
    );
  }

  async download(attachmentId, fileName) {
    try {
      const token = await AP.context.getToken();
      
      const response = await requestConfluence(
        route`/wiki/api/v2/pages/attachments/${attachmentId}/data`
      );

      if (!response.ok) throw new Error('Failed to download');

      const blob = await response.blob();
      const url = window.URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      window.URL.revokeObjectURL(url);

      return true;
    } catch (error) {
      console.error('Error downloading:', error);
      throw error;
    }
  }

  async delete(attachmentId) {
    try {
      const token = await AP.context.getToken();
      
      const response = await fetch(
        `/wiki/rest/api/content/attachment/${attachmentId}`,
        {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${token}` }
        }
      );

      return response.ok;
    } catch (error) {
      console.error('Error deleting:', error);
      throw error;
    }
  }

  async upload(pageId, file, comment = '') {
    try {
      const token = await AP.context.getToken();
      
      const formData = new FormData();
      formData.append('file', file);
      if (comment) {
        formData.append('comment', comment);
      }

      const spaceKey = AP.context.getSpaceKey();

      const response = await fetch(
        `/wiki/rest/api/content/${pageId}/child/attachment?os_authType=bearer&spaceKey=${spaceKey}`,
        {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}` },
          body: formData
        }
      );

      if (!response.ok) {
        const errorData = await response.json();
        throw new Error(errorData.message || 'Failed to upload');
      }

      return await response.json();
    } catch (error) {
      console.error('Error uploading:', error);
      throw error;
    }
  }
}

export const attachmentStore = new AttachmentStore();
```

