---
# Attachment API Operations

## List Attachments on a Page

```javascript
// src/utils/attachments.js
import { route } from '@forge/api';
import { requestConfluence } from '@forge/bridge';

export async function listAttachments(pageId, options = {}) {
  const { start = 0, limit = 25, expand = 'mediaThumbUrl' } = options;

  try {
    const response = await requestConfluence(
      route`/wiki/api/v2/pages/${pageId}/attachments?start=${start}&limit=${limit}&expand=${expand}`
    );

    if (!response.ok) throw new Error('Failed to get attachments');

    const data = await response.json();
    
    return {
      attachments: data.results || [],
      start: data.start,
      limit: data.limit,
      size: data.size,
      total: data.total
    };
  } catch (error) {
    console.error('Error listing attachments:', error);
    throw error;
  }
}

// Usage - Get first page of attachments
const result = await listAttachments(pageId);
console.log(`${result.attachments.length} attachments found`);

// Usage - Iterate through all attachments
async function getAllAttachments(pageId) {
  let start = 0;
  const allAttachments = [];

  do {
    const result = await listAttachments(pageId, { start, limit: 100 });
    allAttachments.push(...(result.attachments || []));
    
    if (result.size < result.limit) break;
    start += result.limit;
  } while (true);

  return allAttachments;
}
```

### Attachment Object Structure

```javascript
{
  id: "attachment-id",
  type: "attachment",
  title: "document.pdf",
  mediaType: "application/pdf",
  fileSize: 123456,
  creationDate: "2024-01-15T10:30:00.000Z",
  version: {
    number: 1,
    minorEdit: false
  },
  mediaThumbUrl: "/wiki/download/attachments/...",
  downloadUrl: "/wiki/download/attachments/..."
}
```

## Download Attachment

```javascript
export async function downloadAttachment(attachmentId, fileName) {
  try {
    const token = await AP.context.getToken();
    
    // Get the attachment content
    const response = await requestConfluence(
      route`/wiki/api/v2/pages/attachments/${attachmentId}/data`
    );

    if (!response.ok) throw new Error('Failed to download');

    // Create blob and trigger download
    const blob = await response.blob();
    const url = window.URL.createObjectURL(blob);
    
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    window.URL.revokeObjectURL(url);
  } catch (error) {
    console.error('Error downloading attachment:', error);
    throw error;
  }
}

// Usage
await downloadAttachment(attachmentId, 'document.pdf');
```

## Upload Attachment to Page

```javascript
export async function uploadAttachment(pageId, file, options = {}) {
  const { comment = '' } = options;

  try {
    const token = await AP.context.getToken();

    const formData = new FormData();
    formData.append('file', file);
    if (comment) {
      formData.append('comment', comment);
    }

    // Get space key from context
    const spaceKey = AP.context.getSpaceKey();

    const response = await fetch(
      `/wiki/rest/api/content/${pageId}/child/attachment?os_authType=bearer&spaceKey=${spaceKey}`,
      {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
        body: formData
      }
    );

    if (!response.ok) {
      const errorData = await response.json();
      throw new Error(errorData.message || 'Failed to upload');
    }

    return await response.json();
  } catch (error) {
    console.error('Error uploading attachment:', error);
    throw error;
  }
}

// Usage
const fileInput = document.querySelector('#file-upload');
if (fileInput.files.length > 0) {
  const result = await uploadAttachment(pageId, fileInput.files[0]);
  console.log(`Uploaded: ${result.title}`);
}
```

## Delete Attachment

```javascript
export async function deleteAttachment(attachmentId) {
  try {
    // Note: The attachment ID is different from page ID
    // You need to get the actual attachment ID first
    
    const token = await AP.context.getToken();
    
    const response = await fetch(
      `/wiki/rest/api/content/attachment/${attachmentId}`,
      {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` }
      }
    );

    return response.ok;
  } catch (error) {
    console.error('Error deleting attachment:', error);
    throw error;
  }
}

// Usage
const success = await deleteAttachment(attachmentId);
```

## Get Attachment by Name

```javascript
export async function findAttachmentByName(pageId, fileName) {
  try {
    const allAttachments = await getAllAttachments(pageId);
    
    return allAttachments.find(
      a => a.title === fileName || a.mediaThumbUrl?.includes(fileName)
    );
  } catch (error) {
    console.error('Error finding attachment:', error);
    throw error;
  }
}

// Usage
const doc = await findAttachmentByName(pageId, 'document.pdf');
if (doc) {
  console.log(`Found: ${doc.downloadUrl}`);
}
```

