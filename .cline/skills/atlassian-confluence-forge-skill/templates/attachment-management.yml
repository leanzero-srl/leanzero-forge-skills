# Best Practices

### 1. Handle Large Attachment Lists

```javascript
export async function getAttachmentsWithProgress(pageId, onProgress) {
  let start = 0;
  const allAttachments = [];

  do {
    const result = await listAttachments(pageId, { start, limit: 50 });
    
    if (result.attachments) {
      allAttachments.push(...(result.attachments || []));
      onProgress(allAttachments.length, result.total);
    }
    
    if (result.size < result.limit) break;
    start += result.limit;
  } while (true);

  return allAttachments;
}
```

### 2. Cache Attachments

```javascript
const attachmentCache = new Map();

export async function getCachedAttachments(pageId, ttlMs = 300000) {
  const cacheKey = `attachments:${pageId}`;
  
  if (attachmentCache.has(cacheKey)) {
    const entry = attachmentCache.get(cacheKey);
    if (Date.now() - entry.timestamp < ttlMs) {
      return entry.data;
    }
  }

  const data = await getAllAttachments(pageId);
  attachmentCache.set(cacheKey, { timestamp: Date.now(), data });
  
  return data;
}
```

### 3. Check File Size Before Upload

```javascript
const MAX_FILE_SIZE = 50 * 1024 * 1024; // 50MB

export function isValidFileSize(file) {
  if (file.size > MAX_FILE_SIZE) {
    alert(`File too large. Maximum size is ${MAX_FILE_SIZE / 1024 / 1024}MB`);
    return false;
  }
  
  return true;
}

// Usage
if (isValidFileSize(selectedFile)) {
  await uploadAttachment(pageId, selectedFile);
}