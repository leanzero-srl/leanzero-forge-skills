# Available Macro Parameters

The macro context provides the following parameters:

```javascript
// AP.context.macro contains:
{
  id: "macro-id",
  configuration: {
    title: "My Title",
    pageId: "123456"
  },
  storageFormat: "storage", // or "wiki"
  contentId: "page-id"
}
```

---
# Macro Permissions

| Permission | Description |
|------------|-------------|
| `read:confluence-content.summary` | View page metadata |
| `read:confluence-content` | View full page content |
| `write:confluence-content` | Modify content |

```yaml
permissions:
  scopes:
    - read:confluence-content.summary
```

