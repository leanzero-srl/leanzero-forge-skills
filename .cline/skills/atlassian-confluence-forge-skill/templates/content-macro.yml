# Content Macro Module Template
# Create custom macros that can be inserted into Confluence page content
# Documentation: https://developer.atlassian.com/cloud/confluence/modules/content-macro/

modules:
  confluence:contentMacro:
    - key: {{APP_KEY}}-my-macro
      resource: main
      name: "{{MACRO_NAME}}"
      description: "{{MACRO_DESCRIPTION}}"
      icon: https://example.com/macro-icon.svg
      
  resources:
    - key: main
      path: static/my-macro/build

permissions:
  scopes:
    - read:confluence-content.summary
    - write:confluence-content

---
# Example Macro Implementation

## Basic Macro (React Component)

```jsx
// src/main.jsx
import React from 'react';
import { AP } from '@forge/bridge';

export default function MyMacro() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function fetchData() {
      try {
        // Get macro parameters
        const params = AP.context.macro?.parameters || {};
        
        // Use parameters to fetch data
        if (params.pageId) {
          // Fetch page content
        }
        
        setData({ params });
      } catch (error) {
        console.error('Macro error:', error);
      } finally {
        setLoading(false);
      }
    }

    fetchData();
  }, []);

  if (loading) {
    return <div>Loading...</div>;
  }

  return (
    <div className="my-macro">
      <h3>{data.params.title || 'My Macro'}</h3>
      <p>Macro executed successfully!</p>
    </div>
  );
}
```

## Macro with Configuration UI

```jsx
// src/config.jsx - Configuration screen for the macro
import React, { useState } from 'react';
import {
  Form,
  Section,
  TextField,
  Select,
  Checkbox
} from '@atlaskit/form';

export default function MacroConfig({ onSave }) {
  const [title, setTitle] = useState('');
  const [pageId, setPageId] = useState('');
  const [showMetadata, setShowMetadata] = useState(true);

  const handleSubmit = () => {
    if (onSave) {
      onSave({
        title,
        pageId: pageId.trim(),
        showMetadata
      });
    }
  };

  return (
    <Form onSubmit={handleSubmit}>
      {({ handleSubmit }) => (
        <Section>
          <TextField
            name="title"
            label="Title"
            isRequired
            onChange={(e) => setTitle(e.target.value)}
            value={title}
          />

          <TextField
            name="pageId"
            label="Page ID (optional)"
            placeholder="e.g., 123456789"
            onChange={(e) => setPageId(e.target.value)}
            value={pageId}
            isCompact
          />

          <Checkbox
            name="showMetadata"
            label="Show metadata"
            defaultChecked={showMetadata}
            onChange={(e) => setShowMetadata(e.target.checked)}
          />

          <button type="submit">Save</button>
        </Section>
      )}
    </Form>
  );
}
```

## Macro with Resolver Pattern

```yaml
# manifest.yml
modules:
  confluence:contentMacro:
    - key: {{APP_KEY}}-dynamic-macro
      resource: main
      name: "Dynamic Data"
      description: "Display dynamic data from external source"
      resolver: macroResolver
      
functions:
  - key: macroResolver
    handler: index.handler

resources:
  - key: main
    path: static/macro/build

permissions:
  scopes:
    - read:confluence-content.summary
```

```javascript
// src/index.js - Resolver function
export const handler = async (args) => {
  const { macro } = args;
  
  // Get macro configuration
  const config = macro.configuration || {};
  
  try {
    // Fetch data based on configuration
    const data = await fetchDataFromExternalSource(config);
    
    return {
      html: `<div class="dynamic-macro">${data}</div>`,
      metadata: {
        canEdit: true,
        css: ['/static/macro/styles.css'],
        js: ['/static/macro/script.js']
      }
    };
  } catch (error) {
    console.error('Macro resolver error:', error);
    
    return {
      html: `<div class="dynamic-macro error">Error loading macro: ${error.message}</div>`
    };
  }
};
```

