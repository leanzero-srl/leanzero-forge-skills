# Deployment

1. Add macro module to `manifest.yml`
2. Build frontend: `npm run build` (if using Create React App)
3. Deploy: `forge deploy --verbose`
4. Install/upgrade: `forge install --upgrade`
5. Use in Confluence: Type `/your-macro-name` and press Enter

---
# Notes

- Content macros appear in the macro browser (`/macro`)
- They can be inserted into any page content
- The macro HTML is rendered inline within the page
- Configuration UI allows users to customize macro behavior
- Resolver pattern provides server-side processing capability