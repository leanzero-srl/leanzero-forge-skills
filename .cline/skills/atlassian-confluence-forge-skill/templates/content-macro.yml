# Example Macro Use Cases

## 1. Page Status Indicator

```jsx
// src/status-macro.jsx
import React, { useState, useEffect } from 'react';
import { route } from '@forge/api';
import { requestConfluence } from '@forge/bridge';

export default function StatusMacro() {
  const [status, setStatus] = useState(null);

  useEffect(() => {
    async function loadStatus() {
      try {
        const pageId = AP.context.macro?.configuration?.pageId;
        
        if (!pageId) return;

        const response = await requestConfluence(
          route`/wiki/api/v2/pages/${pageId}?expand=status`
        );

        if (response.ok) {
          setStatus((await response.json()).status);
        }
      } catch (error) {
        console.error('Failed to load status:', error);
      }
    }

    loadStatus();
  }, []);

  if (!status) return <span>Checking...</span>;

  const colors = {
    current: '#54A276',
    outdated: '#C23B28',
    archived: '#6b7280'
  };

  return (
    <div style={{
      padding: '8px 16px',
      backgroundColor: colors[status] || '#f3f2f1',
      borderRadius: '4px',
      display: 'inline-block'
    }}>
      Status: {status.toUpperCase()}
    </div>
  );
}
```

## 2. Recent Changes Widget

```jsx
// src/recent-changes.jsx
import React, { useState, useEffect } from 'react';
import { route } from '@forge/api';
import { requestConfluence } from '@forge/bridge';

export default function RecentChanges() {
  const [changes, setChanges] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function loadChanges() {
      try {
        const config = AP.context.macro?.configuration || {};
        const limit = parseInt(config.limit) || 10;

        // Get current space
        const spaceKey = AP.context.getSpaceKey();

        const response = await requestConfluence(
          route`/wiki/api/v2/search?cql=type=page%20AND%20space="${spaceKey}"%20AND%20lastModified>-7d&limit=${limit}&expand=title,lastmodifier`
        );

        if (response.ok) {
          const data = await response.json();
          setChanges(data.results || []);
        }
      } catch (error) {
        console.error('Failed to load changes:', error);
      } finally {
        setLoading(false);
      }
    }

    loadChanges();
  }, []);

  if (loading) return <span>Loading...</span>;

  return (
    <div className="recent-changes">
      <h4>Recent Changes</h4>
      
      {changes.length === 0 && <p>No changes in the last 7 days.</p>}
      
      <ul>
        {changes.map(change => (
          <li key={change.id}>
            <a href={`/wiki/spaces/${change.space.key}/pages/${change.id}`}>
              {change.title}
            </a>
            {' - '}
            {change.lastModifier?.displayName || 'Unknown'}
            {' - '}
            {new Date(change.lastModified).toLocaleDateString()}
          </li>
        ))}
      </ul>
    </div>
  );
}
```

## 3. User Activity Stats

```jsx
// src/user-stats.jsx
import React, { useState, useEffect } from 'react';
import { route } from '@forge/api';
import { requestConfluence } from '@forge/bridge';

export default function UserStats() {
  const [stats, setStats] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function loadStats() {
      try {
        // Get current user
        const userId = AP.context.getUserId();
        
        // Count pages created by this user in current space
        const spaceKey = AP.context.getSpaceKey();

        const response = await requestConfluence(
          route`/wiki/api/v2/search?cql=type=page%20AND%20space="${spaceKey}"%20AND%20creator="${userId}"`
        );

        if (response.ok) {
          const data = await response.json();
          
          setStats({
            pagesCreated: data.total || 0,
            spaceName: AP.context.getSpaceDisplayName()
          });
        }
      } catch (error) {
        console.error('Failed to load stats:', error);
      } finally {
        setLoading(false);
      }
    }

    loadStats();
  }, []);

  if (loading) return <span>Loading...</span>;

  return (
    <div className="user-stats">
      <h4>Your Activity</h4>
      
      {stats ? (
        <p>You have created {stats.pagesCreated} pages in the {stats.spaceName} space.</p>
      ) : (
        <p>Unable to load your activity stats.</p>
      )}
    </div>
  );
}
```

