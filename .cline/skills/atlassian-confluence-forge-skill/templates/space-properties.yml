## List All Space Properties

```javascript
export async function listSpaceProperties(spaceKey) {
  const token = await AP.context.getToken();
  
  // Get space ID
  const response = await api.fetch({
    url: `/wiki/api/v2/spaces/${spaceKey}`,
    headers: { Authorization: `Bearer ${token}` }
  });

  if (!response.ok) throw new Error('Failed to get space');

  const spaceData = await response.json();
  const spaceId = spaceData.id;

  // List properties
  const propResponse = await api.fetch({
    url: `/wiki/api/v2/spaces/${spaceId}/properties`,
    headers: { Authorization: `Bearer ${token}` }
  });

  if (!propResponse.ok) throw new Error('Failed to list properties');

  const data = await propResponse.json();
  return data.results || [];
}

// Usage
const allProperties = await listSpaceProperties('PROJ');
