# Common Patterns

## Pattern 1: Space-Wide Default Configuration

```javascript
// src/utils/config.js
import { api } from '@forge/bridge';

export async function getSpaceDefaults(spaceKey) {
  const token = await AP.context.getToken();
  
  // Try to get space defaults first
  try {
    const response = await api.fetch({
      url: `/wiki/api/v2/spaces/${spaceKey}`,
      headers: { Authorization: `Bearer ${token}` }
    });

    if (response.ok) {
      const spaceData = await response.json();
      const spaceId = spaceData.id;

      const propResponse = await api.fetch({
        url: `/wiki/api/v2/spaces/${spaceId}/properties/myapp:defaults`,
        headers: { Authorization: `Bearer ${token}` }
      });

      if (propResponse.ok) {
        return (await propResponse.json()).value;
      }
    }
  } catch (error) {
    // Property doesn't exist or other error
  }

  // Return defaults
  return {
    syncEnabled: true,
    externalApiUrl: '',
    labelsToSync: ['sync'],
    batchSize: 10
  };
}
```

## Pattern 2: Space Property Helper Class

```javascript
// src/utils/spacePropertyStore.js
import { api } from '@forge/bridge';

export class SpacePropertyStore {
  constructor(appPrefix = 'myapp:') {
    this.appPrefix = appPrefix;
    this._spaceIdCache = new Map();
  }

  async _getSpaceId(spaceKey, token) {
    if (this._spaceIdCache.has(spaceKey)) {
      return this._spaceIdCache.get(spaceKey);
    }

    const response = await api.fetch({
      url: `/wiki/api/v2/spaces/${spaceKey}`,
      headers: { Authorization: `Bearer ${token}` }
    });

    if (!response.ok) throw new Error(`Failed to get space: ${spaceKey}`);

    const data = await response.json();
    this._spaceIdCache.set(spaceKey, data.id);

    return data.id;
  }

  async _getFullKey(key) {
    return `${this.appPrefix}${key}`;
  }

  async get(spaceKey, key) {
    try {
      const token = await AP.context.getToken();
      const spaceId = await this._getSpaceId(spaceKey, token);
      const fullKey = await this._getFullKey(key);

      const response = await api.fetch({
        url: `/wiki/api/v2/spaces/${spaceId}/properties/${fullKey}`,
        headers: { Authorization: `Bearer ${token}` }
      });

      if (response.status === 404) return null;
      if (!response.ok) throw new Error('Failed to get property');

      const data = await response.json();
      return data.value;
    } catch (error) {
      console.error(`Error getting space property ${key}:`, error);
      throw error;
    }
  }

  async set(spaceKey, key, value) {
    try {
      const token = await AP.context.getToken();
      const spaceId = await this._getSpaceId(spaceKey, token);
      const fullKey = await this._getFullKey(key);

      const response = await api.fetch({
        url: `/wiki/api/v2/spaces/${spaceId}/properties/${fullKey}`,
        method: 'PUT',
        headers: {
          Authorization: `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ value })
      });

      if (!response.ok) throw new Error('Failed to set property');

      return true;
    } catch (error) {
      console.error(`Error setting space property ${key}:`, error);
      throw error;
    }
  }

  async delete(spaceKey, key) {
    try {
      const token = await AP.context.getToken();
      const spaceId = await this._getSpaceId(spaceKey, token);
      const fullKey = await this._getFullKey(key);

      const response = await api.fetch({
        url: `/wiki/api/v2/spaces/${spaceId}/properties/${fullKey}`,
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` }
      });

      return response.ok;
    } catch (error) {
      console.error(`Error deleting space property ${key}:`, error);
      throw error;
    }
  }

  async clear(spaceKey) {
    try {
      const token = await AP.context.getToken();
      const spaceId = await this._getSpaceId(spaceKey, token);

      // List all properties
      const listResponse = await api.fetch({
        url: `/wiki/api/v2/spaces/${spaceId}/properties`,
        headers: { Authorization: `Bearer ${token}` }
      });

      if (!listResponse.ok) throw new Error('Failed to list properties');

      const data = await listResponse.json();
      const results = data.results || [];

      // Delete all app properties
      for (const prop of results) {
        if (prop.key.startsWith(this.appPrefix)) {
          await this.delete(spaceKey, prop.key.replace(this.appPrefix, ''));
        }
      }

      return true;
    } catch (error) {
      console.error('Error clearing space properties:', error);
      throw error;
    }
  }
}

// Usage
export const spacePropertyStore = new SpacePropertyStore('myapp:');
```

