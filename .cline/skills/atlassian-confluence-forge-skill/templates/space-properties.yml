---
# Space Properties API Usage

## Get Space Property

```javascript
// src/utils/spaceProperties.js
import { api } from '@forge/bridge';

export async function getSpaceProperty(spaceKey, propertyKey) {
  const token = await AP.context.getToken();
  
  // First need to find a page in this space to get the space ID
  const response = await api.fetch({
    url: `/wiki/api/v2/spaces/${spaceKey}`,
    headers: { Authorization: `Bearer ${token}` }
  });

  if (!response.ok) return null;

  const spaceData = await response.json();
  const spaceId = spaceData.id;

  // Now get the property
  const propResponse = await api.fetch({
    url: `/wiki/api/v2/spaces/${spaceId}/properties/${propertyKey}`,
    headers: { Authorization: `Bearer ${token}` }
  });

  if (propResponse.status === 404) return null;
  if (!propResponse.ok) throw new Error('Failed to get property');

  const propData = await propResponse.json();
  return propData.value;
}

// Usage
const defaultValue = await getSpaceProperty('PROJ', 'myapp:defaults');
```

## Set Space Property

```javascript
export async function setSpaceProperty(spaceKey, propertyKey, value) {
  const token = await AP.context.getToken();
  
  // Get space ID
  const response = await api.fetch({
    url: `/wiki/api/v2/spaces/${spaceKey}`,
    headers: { Authorization: `Bearer ${token}` }
  });

  if (!response.ok) throw new Error('Failed to get space');

  const spaceData = await response.json();
  const spaceId = spaceData.id;

  // Set the property
  const propResponse = await api.fetch({
    url: `/wiki/api/v2/spaces/${spaceId}/properties/${propertyKey}`,
    method: 'PUT',
    headers: {
      Authorization: `Bearer ${token}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ value })
  });

  if (!propResponse.ok) throw new Error('Failed to set property');

  return true;
}

// Usage
await setSpaceProperty('PROJ', 'myapp:defaults', {
  syncEnabled: true,
  externalApiUrl: 'https://api.example.com',
  labelsToSync: ['sync-required']
});
```

