# Space Settings UI Integration

```jsx
// src/space-settings.jsx
import React, { useState, useEffect } from 'react';
import {
  Form,
  Section,
  TextField,
  Checkbox,
  Select,
  Button
} from '@atlaskit/form';
import { api } from '@forge/bridge';

export default function SpaceSettings() {
  const [spaceKey] = useState(AP.context.getSpaceKey());
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  
  // Form state
  const [syncEnabled, setSyncEnabled] = useState(true);
  const [externalApiUrl, setExternalApiUrl] = useState('');
  const [labelsToSync, setLabelsToSync] = useState('');

  useEffect(() => {
    async function loadSettings() {
      try {
        const token = await AP.context.getToken();
        
        // Get space ID first
        const spaceResponse = await api.fetch({
          url: `/wiki/api/v2/spaces/${spaceKey}`,
          headers: { Authorization: `Bearer ${token}` }
        });

        if (spaceResponse.ok) {
          const spaceData = await spaceResponse.json();
          const spaceId = spaceData.id;

          // Load properties
          const syncResponse = await api.fetch({
            url: `/wiki/api/v2/spaces/${spaceId}/properties/myapp:defaults`,
            headers: { Authorization: `Bearer ${token}` }
          });

          if (syncResponse.ok) {
            const props = await syncResponse.json();
            const defaults = props.value || {};
            
            setSyncEnabled(defaults.syncEnabled ?? true);
            setExternalApiUrl(defaults.externalApiUrl ?? '');
            setLabelsToSync((defaults.labelsToSync || []).join(', '));
          }
        }
      } catch (error) {
        console.error('Failed to load settings:', error);
      } finally {
        setLoading(false);
      }
    }

    if (spaceKey) {
      loadSettings();
    }
  }, [spaceKey]);

  const handleSubmit = async () => {
    setSaving(true);

    try {
      const token = await AP.context.getToken();

      // Get space ID
      const spaceResponse = await api.fetch({
        url: `/wiki/api/v2/spaces/${spaceKey}`,
        headers: { Authorization: `Bearer ${token}` }
      });

      if (spaceResponse.ok) {
        const spaceData = await spaceResponse.json();
        const spaceId = spaceData.id;

        // Save properties
        await api.fetch({
          url: `/wiki/api/v2/spaces/${spaceId}/properties/myapp:defaults`,
          method: 'PUT',
          headers: {
            Authorization: `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            value: {
              syncEnabled,
              externalApiUrl,
              labelsToSync: labelsToSync
                .split(',')
                .map(l => l.trim())
                .filter(Boolean)
            }
          })
        });

        console.log('Settings saved successfully');
      }
    } catch (error) {
      console.error('Failed to save settings:', error);
    } finally {
      setSaving(false);
    }
  };

  if (loading) {
    return <div>Loading settings...</div>;
  }

  return (
    <Form onSubmit={handleSubmit}>
      {({ handleSubmit }) => (
        <Section>
          <TextField
            name="externalApiUrl"
            label="External API URL"
            defaultValue={externalApiUrl}
            onChange={(e) => setExternalApiUrl(e.target.value)}
            isCompact
          />

          <Checkbox
            name="syncEnabled"
            label="Enable Sync"
            defaultChecked={syncEnabled}
            onChange={(e) => setSyncEnabled(e.target.checked)}
          />

          <TextField
            name="labelsToSync"
            label="Labels to Sync (comma separated)"
            defaultValue={labelsToSync}
            onChange={(e) => setLabelsToSync(e.target.value)}
            isCompact
          />

          <Button type="submit" isLoading={saving}>
            Save Settings
          </Button>
        </Section>
      )}
    </Form>
  );
}
```

