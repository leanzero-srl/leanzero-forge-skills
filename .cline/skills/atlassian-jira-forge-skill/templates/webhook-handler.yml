## Key Points About Event Handlers

### Automatic Retries
- Event handlers support **automatic retries** on failure
- Scheduled triggers do NOT have this feature

### Event Filtering Best Practices
1. Subscribe only to events you need (reduce unnecessary invocations)
2. Add additional filtering in your handler code
3. Use configuration UI to let users customize filters

### Common Use Cases
1. **Sync to external systems** when issues change
2. **Send notifications** via Slack/Teams on specific events
3. **Auto-assign issues** based on created date or type
4. **Validate data** after creation/update (use with post-functions instead)
5. **Audit logging** for compliance requirements

## Testing

1. Deploy: `forge deploy`
2. Install: `forge install --upgrade`
3. Trigger events in Jira (create/update issues)
4. View logs: `forge logs -n 50`

