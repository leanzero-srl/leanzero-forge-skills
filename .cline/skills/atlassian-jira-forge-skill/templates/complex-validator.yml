# Jira Forge Complex Multi-Rule Validator Template

Copy this file and modify for your specific use case.

## File: manifest.yml (add to modules section)

```yaml
modules:
  jira:workflowValidator:
    - key: multi-rule-validator        # REQUIRED: Unique identifier
      name: Multi-Rule Validator               # REQUIRED: Display name
      description: Validates multiple rules based on configuration  # REQUIRED
      function: validateMultipleRules          # Function handler
      
      projectTypes:                            # Optional: restrict by project type
        - company-managed
        - team-managed
        
      errorMessage: "Validation failed"        # Default error message
      
      create:                                  # Configuration UI for creation
        resource: validator-config-ui
      view:                                    # View UI (optional)
        resource: validator-view-ui

# Function module definition
function:
  - key: validateMultipleRules
    handler: index.validateMultipleRules

resources:
  - key: validator-config-ui
    path: static/config/build
  - key: validator-view-ui
    path: static/view/build
```

## File: src/index.js

```javascript
/**
 * Complex Multi-Rule Validator
 * Supports multiple validation rules configured by the user
 */

// Rule types supported by this validator
const RULE_TYPES = {
  REQUIRED_FIELD: 'requiredField',
  MIN_LENGTH: 'minLength',
  MAX_LENGTH: 'maxLength',
  REGEX_PATTERN: 'regexPattern',
  EQUALS_VALUE: 'equalsValue',
  NOT_EQUALS_VALUE: 'notEqualsValue',
  CONTAINS_TEXT: 'containsText',
  STATUS_IS: 'statusIs',
  STATUS_NOT: 'statusNot',
  ASSIGNEE_EXISTS: 'assigneeExists'
};

/**
 * Main validation handler
 */
export const validateMultipleRules = async (args) => {
  const { issue, configuration } = args;
  
  try {
    console.log('Validating issue:', issue.key);
    console.log('Configuration rules:', configuration?.rules || []);
    
    // Get configured rules from validator settings
    const rules = configuration?.rules || [];
    
    if (rules.length === 0) {
      console.log('No validation rules configured');
      return { result: true };
    }
    
    // Validate all rules and collect failures
    const failures = await validateAllRules(issue, rules);
    
    if (failures.length > 0) {
      return { 
        result: false, 
        errorMessage: formatErrorMessage(failures) 
      };
    }
    
    console.log('Validation passed');
    return { result: true };
    
  } catch (error) {
    console.error('Validator error:', error);
    return { 
      result: false, 
      errorMessage: `Error during validation: ${error.message}` 
    };
  }
};

/**
 * Validate all rules against the issue
 */
async function validateAllRules(issue, rules) {
  const failures = [];
  
  for (const rule of rules) {
    if (!rule.enabled) continue; // Skip disabled rules
    
    const failure = await applyRule(rule, issue);
    
    if (failure) {
      failures.push(failure);
      
      // Optional: fail fast on first error
      // if (rule.failFast) return failures;
    }
  }
  
  return failures;
}

/**
 * Apply a single validation rule
 */
async function applyRule(rule, issue) {
  switch (rule.type) {
    case RULE_TYPES.REQUIRED_FIELD:
      return validateRequiredField(issue, rule);
      
    case RULE_TYPES.MIN_LENGTH:
      return validateMinLength(issue, rule);
      
    case RULE_TYPES.MAX_LENGTH:
      return validateMaxLength(issue, rule);
      
    case RULE_TYPES.REGEX_PATTERN:
      return validateRegexPattern(issue, rule);
      
    case RULE_TYPES.EQUALS_VALUE:
      return validateEqualsValue(issue, rule);
      
    case RULE_TYPES.CONTAINS_TEXT:
      return validateContainsText(issue, rule);
      
    case RULE_TYPES.STATUS_IS:
      return validateStatusIs(issue, rule);
      
    case RULE_TYPES.ASSIGNEE_EXISTS:
      return validateAssigneeExists(issue, rule);
      
    default:
      console.log('Unknown rule type:', rule.type);
      return null; // Unknown rules don't fail validation
  }
}

// --- Individual Rule Validators ---

function validateRequiredField(issue, rule) {
  const value = getFieldValue(issue, rule.fieldId);
  
  if (!value || (typeof value === 'string' && value.trim() === '')) {
    return rule.errorMessage || `The ${rule.label || 'field'} is required`;
  }
  
  return null;
}

function validateMinLength(issue, rule) {
  const value = getFieldValue(issue, rule.fieldId);
  
  if (value && String(value).length < rule.minLength) {
    return rule.errorMessage || 
      `${rule.label || 'Field'} must be at least ${rule.minLength} characters`;
  }
  
  return null;
}

function validateMaxLength(issue, rule) {
  const value = getFieldValue(issue, rule.fieldId);
  
  if (value && String(value).length > rule.maxLength) {
    return rule.errorMessage || 
      `${rule.label || 'Field'} must be no more than ${rule.maxLength} characters`;
  }
  
  return null;
}

function validateRegexPattern(issue, rule) {
  const value = getFieldValue(issue, rule.fieldId);
  
  if (value && !new RegExp(rule.pattern).test(String(value))) {
    return rule.errorMessage || 
      `${rule.label || 'Field'} doesn't match required pattern`;
  }
  
  return null;
}

function validateEqualsValue(issue, rule) {
  const value = getFieldValue(issue, rule.fieldId);
  
  if (value != rule.expectedValue) {
    return rule.errorMessage || 
      `${rule.label || 'Field'} must equal "${rule.expectedValue}"`;
  }
  
  return null;
}

function validateContainsText(issue, rule) {
  const value = getFieldValue(issue, rule.fieldId);
  
  if (!value || !String(value).includes(rule.text)) {
    return rule.errorMessage || 
      `${rule.label || 'Field'} must contain "${rule.text}"`;
  }
  
  return null;
}

function validateStatusIs(issue, rule) {
  const status = issue.fields?.status?.name;
  
  if (status !== rule.expectedStatus) {
    return rule.errorMessage || 
      `Issue status must be "${rule.expectedStatus}"`;
  }
  
  return null;
}

function validateAssigneeExists(issue, rule) {
  const assignee = issue.fields?.assignee;
  
  if (!assignee) {
    return rule.errorMessage || 'Issue must have an assignee';
  }
  
  return null;
}

// --- Utility Functions ---

/**
 * Get field value from issue, handling nested fields
 */
function getFieldValue(issue, fieldId) {
  if (!fieldId) return undefined;
  
  // Handle direct field access (e.g., 'summary', 'description')
  if (!fieldId.includes('.')) {
    return issue.fields?.[fieldId];
  }
  
  // Handle nested field access (e.g., 'fields.status.name')
  const parts = fieldId.split('.');
  let value = issue.fields;
  
  for (const part of parts) {
    if (!value) return undefined;
    value = value[part];
  }
  
  return value;
}

/**
 * Format multiple failures into error message
 */
function formatErrorMessage(failures) {
  if (failures.length === 1) {
    return failures[0];
  }
  
  return `Validation failed:\n- ${failures.join('\n- ')}`;
}

/**
 * Get validation rule type labels for UI dropdowns
 */
export function getRuleTypeOptions() {
  return [
    { label: 'Required Field', value: RULE_TYPES.REQUIRED_FIELD },
    { label: 'Minimum Length', value: RULE_TYPES.MIN_LENGTH },
    { label: 'Maximum Length', value: RULE_TYPES.MAX_LENGTH },
    { label: 'Regex Pattern', value: RULE_TYPES.REGEX_PATTERN },
    { label: 'Equals Value', value: RULE_TYPES.EQUALS_VALUE },
    { label: 'Contains Text', value: RULE_TYPES.CONTAINS_TEXT },
    { label: 'Status Is', value: RULE_TYPES.STATUS_IS },
    { label: 'Assignee Exists', value: RULE_TYPES.ASSIGNEE_EXISTS }
  ];
}
