## Key Points About Complex Validators

### Rule Types Available
| Rule Type | Description | Use Case |
|-----------|-------------|----------|
| `requiredField` | Field must have a value | Ensure mandatory fields are filled |
| `minLength` | Minimum character count | Enforce description length |
| `maxLength` | Maximum character count | Prevent overly long text |
| `regexPattern` | Match regex pattern | Validate ID formats, codes |
| `equalsValue` | Exact match required | Enforce specific values |
| `containsText` | Must contain substring | Require keywords |
| `statusIs` | Status must be X | Gate on status transitions |
| `assigneeExists` | Issue must be assigned | Ensure accountability |

### Configuration Structure
```json
{
  "rules": [
    {
      "id": 1234567890,
      "type": "minLength",
      "fieldId": "description",
      "label": "Description",
      "enabled": true,
      "minLength": 50,
      "errorMessage": "Description must be at least 50 characters"
    }
  ],
  "version": "1.0"
}
```

### Common Use Cases
1. **Compliance validation** - Multiple rules for regulatory requirements
2. **Data quality enforcement** - Ensure consistent data entry
3. **Workflow gates** - Complex conditions before allowing transitions
4. **Multi-field validation** - Inter-dependent field requirements

