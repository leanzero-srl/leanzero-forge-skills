## File: src/Configure.js (Configuration UI)

```javascript
import React, { useState, useEffect } from 'react';
import { Form, Select, FieldText, TextArea, ButtonGroup, Button, Label } from '@forge/bridge';
import { getRuleTypeOptions } from './index';

export const Configure = () => {
  const [fields, setFields] = useState([]);
  const [rules, setRules] = useState([]);
  const [ruleType, setRuleType] = useState('');
  const [selectedFieldId, setSelectedFieldId] = useState('');
  const [errorMessage, setErrorMessage] = useState('');
  
  // Rule type specific options
  const [minLength, setMinLength] = useState(10);
  const [maxLength, setMaxLength] = useState(500);
  const [pattern, setPattern] = useState('');
  const [expectedValue, setExpectedValue] = useState('');

  useEffect(() => {
    fetchFields();
  }, []);

  // Fetch available fields from Jira
  const fetchFields = async () => {
    try {
      const response = await bridge.requestJira('/rest/api/3/field');
      const data = await response.json();
      
      setFields(data.map(f => ({
        label: f.name,
        value: f.id,
        type: f.custom ? 'Custom' : 'System'
      })));
    } catch (error) {
      console.error('Error fetching fields:', error);
    }
  };

  // Add a new rule to the list
  const addRule = () => {
    if (!ruleType || !selectedFieldId) {
      alert('Please select a rule type and field');
      return;
    }

    const newRule = {
      id: Date.now(),
      type: ruleType,
      fieldId: selectedFieldId,
      label: fields.find(f => f.value === selectedFieldId)?.label || selectedFieldId,
      enabled: true,
      errorMessage: errorMessage || ''
    };

    // Add type-specific configuration
    switch (ruleType) {
      case 'minLength':
        newRule.minLength = minLength;
        break;
      case 'maxLength':
        newRule.maxLength = maxLength;
        break;
      case 'regexPattern':
        newRule.pattern = pattern;
        break;
      case 'equalsValue':
        newRule.expectedValue = expectedValue;
        break;
    }

    setRules([...rules, newRule]);
    
    // Reset form
    setRuleType('');
    setSelectedFieldId('');
    setErrorMessage('');
  };

  // Remove a rule from the list
  const removeRule = (ruleId) => {
    setRules(rules.filter(r => r.id !== ruleId));
  };

  // Toggle rule enabled state
  const toggleRuleEnabled = (ruleId) => {
    setRules(rules.map(r => 
      r.id === ruleId ? { ...r, enabled: !r.enabled } : r
    ));
  };

  return (
    <Form>
      <Label>Validation Rules Configuration</Label>
      
      {/* Rule Type Selection */}
      <Select
        label="Rule Type"
        options={getRuleTypeOptions()}
        value={ruleType}
        onChange={(e) => setRuleType(e.target.value)}
      />

      {/* Field Selection */}
      <Select
        label="Field to Validate"
        options={fields.map(f => ({ label: f.label, value: f.value }))}
        value={selectedFieldId}
        onChange={(e) => setSelectedFieldId(e.target.value)}
      />

      {/* Type-specific configuration */}
      {ruleType === 'minLength' && (
        <FieldText
          type="number"
          label="Minimum Length"
          value={minLength}
          onChange={(e) => setMinLength(Number(e.target.value))}
        />
      )}

      {ruleType === 'maxLength' && (
        <FieldText
          type="number"
          label="Maximum Length"
          value={maxLength}
          onChange={(e) => setMaxLength(Number(e.target.value))}
        />
      )}

      {ruleType === 'regexPattern' && (
        <FieldText
          label="Regex Pattern"
          placeholder="e.g., ^[A-Z]{3}-\d+$"
          value={pattern}
          onChange={(e) => setPattern(e.target.value)}
        />
      )}

      {ruleType === 'equalsValue' && (
        <FieldText
          label="Expected Value"
          value={expectedValue}
          onChange={(e) => setExpectedValue(e.target.value)}
        />
      )}

      {/* Custom Error Message */}
      <TextArea
        label="Custom Error Message (optional)"
        placeholder="Leave empty for default message"
        value={errorMessage}
        onChange={(e) => setErrorMessage(e.target.value)}
      />

      <ButtonGroup>
        <Button onClick={addRule}>Add Rule</Button>
      </ButtonGroup>

      {/* Configured Rules List */}
      {rules.length > 0 && (
        <>
          <Label style={{ marginTop: '24px' }}>Configured Rules ({rules.length})</Label>
          
          {rules.map((rule, index) => (
            <div key={rule.id} style={{
              padding: '12px',
              marginBottom: '8px',
              backgroundColor: rule.enabled ? '#f5f5f5' : '#fafafa',
              borderRadius: '4px',
              opacity: rule.enabled ? 1 : 0.6
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                <span>
                  {index + 1}. {rule.label} - {getRuleTypeLabel(rule.type)}
                </span>
                <ButtonGroup>
                  <button 
                    onClick={() => toggleRuleEnabled(rule.id)}
                    style={{ background: 'none', border: 'none', cursor: 'pointer' }}
                  >
                    {rule.enabled ? 'Disable' : 'Enable'}
                  </button>
                  <button 
                    onClick={() => removeRule(rule.id)}
                    style={{ background: '#ff4d4f', color: 'white', border: 'none', borderRadius: '3px', padding: '2px 8px', cursor: 'pointer' }}
                  >
                    Remove
                  </button>
                </ButtonGroup>
              </div>
            </div>
          ))}
        </>
      )}
    </Form>
  );
};

function getRuleTypeLabel(type) {
  const options = getRuleTypeOptions();
  return options.find(o => o.value === type)?.label || type;
}

export const onSaveConfiguration = async () => {
  return JSON.stringify({
    rules: rules,
    version: '1.0'
  });
};
```

