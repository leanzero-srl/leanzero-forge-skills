  },
  "pullrequest": {
    "id": 123
  },
  "trigger": {
    "type": "on-code-pushed"
  }
}

// For on-merge trigger, additional merge properties are included:
{
  "workspace": { ... },
  "repository": { ... },
  "pullrequest": { ... },
  "trigger": {
    "type": "on-merge"
  },
  "mergeProperties": {
    "commitMessage": "Merged in testbranch (pull request #5)\n\ntesting PR\n\n",
    "commitMessageTruncated": false,
    "mergeStrategy": "merge_commit",
    "closeSourceBranch": true
  }
}
```

## Required Permissions

```yaml
permissions:
  scopes:
    - 'read:pullrequest:bitbucket'  # Required for pull request data
```

For additional API access, add more scopes:

```yaml
permissions:
  scopes:
    - 'read:pullrequest:bitbucket'
    - 'read:repository:bitbucket'     # For repository details
    - 'write:repository:bitbucket'    # For writing comments
```

## Common Use Cases

### 1. Prevent Merging to Protected Branches

```yaml
modules:
  bitbucket:mergeCheck:
    - key: branch-protection-check
      function: checkFunction
      name: { value: 'Branch Protection Check' }
      triggers:
        - on-merge

function:
  - key: checkFunction
    handler: index.run

permissions:
  scopes:
    - 'read:pullrequest:bitbucket'
```

```javascript
// src/index.js
export const checkFunction = async (event, context) => {
  const targetBranch = event.pullrequest.toRef.displayId;
  const protectedBranches = ['main', 'master', 'develop'];
  
  if (protectedBranches.includes(targetBranch)) {
    return {
      success: true,
      message: `Merging into ${targetBranch} is allowed`
    };
  }
  
  // Non-protected branches - check if user is admin
  const contextInfo = await bridge.getContext();
  
  if (contextInfo.accountType !== 'licensed') {
    return {
      success: false,
      message: 'Only licensed users can merge to non-protected branches'
    };
  }
  
  return {
    success: true,
    message: 'Merge allowed'
  };
};
```

### 2. Require Minimum Lines Changed

```javascript
// src/index.js - Minimum Changes Validation
export const checkFunction = async (event, context) => {
  const workspaceUuid = event.workspace.uuid;
  const repoUuid = event.repository.uuid;
  const prId = event.pullrequest.id;
  
  // Fetch diff statistics
  const response = await api.asApp().requestBitbucket(
    `/2.0/repositories/${workspaceUuid}/${repoUuid}/pullrequests/${prId}/diffstat`
  );
  
  const diffStats = await response.json();
  const totalLines = diffStats.total_lines_added + diffStats.total_lines_removed;
  
  if (totalLines < 5) {
    return {
      success: false,
      message: 'PR must have at least 5 lines changed'
    };
  }
  
  return {
    success: true,
    message: `Validated ${totalLines} lines changed`
  };
};
```

### 3. Enforce Code Review Approval

```javascript
// src/index.js - Approval Verification
export const checkFunction = async (event, context) => {
  const workspaceUuid = event.workspace.uuid;
  const repoUuid = event.repository.uuid;
  const prId = event.pullrequest.id;
  
  // Fetch participants list
  const response = await api.asApp().requestBitbucket(
    `/2.0/repositories/${workspaceUuid}/${repoUuid}/pullrequests/${prId}/participants`
  );
  
  const participants = await response.json();
  
  // Check if PR has at least one approval
  const approvedBy = participants.filter(p => p.approved === true);
  
  if (approvedBy.length < 1) {
    return {
      success: false,
      message: 'PR requires at least one approval'
    };
  }
  
  return {
    success: true,
    message: `Approved by ${approvedBy.map(p => p.user.display_name).join(', ')}` 
  };
};
```

## Testing the Merge Check

### Using Bitbucket CLI (if available)
```bash
# Deploy your app
forge deploy

# Install to workspace
forge install --context bitbucket
```

### Manual Testing Steps
1. Deploy and install the app to a Bitbucket workspace
2. Enable custom merge checks in repository settings
3. Create a test pull request
4. Push code changes (triggers `on-code-pushed`)
5. Attempt to merge (triggers `on-merge`)

## Merge Check Result Format

```javascript
// Successful check
{
  "success": true,
  "message": "All checks passed!"
}

// Failed check with message
{
  "success": false,
  "message": "PR title contains DRAFT"
}

// Failed check without message (uses default)
{
  "success": false
}
```

## UI in Bitbucket

The merge check result appears in the PR UI:
- ✅ **Success**: Checkmark icon, green color
- ❌ **Failure**: X icon, red color
- ℹ️ **Message**: Displayed below the status

## Important Notes

1. **Required Configuration**: Admin must enable custom merge checks in workspace settings
2. **Multiple Checks**: Multiple apps can provide merge checks; all must pass if Required
3. **Informational vs Required**: Check can be configured as informational only
4. **Error Handling**: Exceptions result in failed check status

## Troubleshooting

| Issue | Cause | Solution |
|-------|-------|----------|
| Check not running | Workspace feature disabled | Enable custom merge checks in workspace settings |
| Permission denied | Missing scope | Add `read:pullrequest:bitbucket` to manifest |
| Silent failure | Exception in code | Check Forge logs for stack trace |

