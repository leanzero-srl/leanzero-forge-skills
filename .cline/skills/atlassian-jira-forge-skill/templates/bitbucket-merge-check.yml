# Bitbucket Merge Check Template

## Overview
This template demonstrates how to create a custom merge check for Bitbucket that validates pull requests before merging.

## Basic Module Structure

```yaml
modules:
  bitbucket:mergeCheck:
    - key: my-merge-check
      function: checkFunction
      name: { value: 'My Merge Check' }
      description: { value: 'Validates PR before merge' }
      triggers:
        - on-code-pushed

function:
  - key: checkFunction
    handler: index.run

permissions:
  scopes:
    - 'read:pullrequest:bitbucket'
```

## Complete Manifest with All Triggers

```yaml
modules:
  bitbucket:mergeCheck:
    - key: pr-title-validator
      function: checkFunction
      name: { value: 'PR Title Validator' }
      description: { value: 'Checks that PR titles follow conventions' }
      triggers:
        - on-code-pushed
        - on-merge

function:
  - key: checkFunction
    handler: index.run

permissions:
  scopes:
    - 'read:pullrequest:bitbucket'

app:
  id: ari:cloud:ecosystem::app/your-app-id
```

## Function Implementation

### Basic Merge Check Handler

```javascript
// src/index.js - Merge Check Implementation
export const checkFunction = async (event, context) => {
  console.log('Merge check triggered:', JSON.stringify(event, null, 2));
  
  try {
    // Extract pull request information
    const workspaceUuid = event.workspace.uuid;
    const repoUuid = event.repository.uuid;
    const prId = event.pullrequest.id;
    
    // Perform validation checks
    const result = await performValidation(workspaceUuid, repoUuid, prId);
    
    return result;
  } catch (error) {
    console.error('Merge check error:', error);
    return {
      success: false,
      message: `Check failed with error: ${error.message}`
    };
  }
};

const performValidation = async (workspaceUuid, repoUuid, prId) => {
  const api = require('@forge/api');
  
  // Fetch pull request details
  const response = await api.asApp().requestBitbucket(
    `/2.0/repositories/${workspaceUuid}/${repoUuid}/pullrequests/${prId}`
  );
  
  const pr = await response.json();
  
  // Validate PR title (example check)
  if (pr.title.includes('DRAFT')) {
    return {
      success: false,
      message: 'PR title contains DRAFT - remove it before merging'
    };
  }
  
  // If all checks pass
  return {
    success: true,
    message: 'All checks passed!'
  };
};
```

### PR Title Validation

```javascript
// src/index.js - PR Title Validation Logic
export const checkFunction = async (event, context) => {
  const workspaceUuid = event.workspace.uuid;
  const repoUuid = event.repository.uuid;
  const prId = event.pullrequest.id;
  
  // Fetch PR details
  const response = await api.asApp().requestBitbucket(
    `/2.0/repositories/${workspaceUuid}/${repoUuid}/pullrequests/${prId}`
  );
  
  const pr = await response.json();
  
  // Validate title follows conventional format
  const validPatterns = [
    /^feat\(.+\): .+/,
    /^fix\(.+\): .+/,
    /^docs\(.+\): .+/,
    /^refactor\(.+\): .+/
  ];
  
  if (!validPatterns.some(pattern => pattern.test(pr.title))) {
    return {
      success: false,
      message: `Title "${pr.title}" does not follow conventional format. Use: feat(scope): description, fix(scope): description, etc.`
    };
  }
  
  // Check title length
  if (pr.title.length > 100) {
    return {
      success: false,
      message: 'PR title is too long (max 100 characters)'
    };
  }
  
  return {
    success: true,
    message: `Title "${pr.title}" is valid`
  };
};
```

### Branch Protection Check

```javascript
// src/index.js - Branch Protection Validation
export const checkFunction = async (event, context) => {
  const workspaceUuid = event.workspace.uuid;
  const repoUuid = event.repository.uuid;
  const prId = event.pullrequest.id;
  
  // Fetch PR details
  const response = await api.asApp().requestBitbucket(
    `/2.0/repositories/${workspaceUuid}/${repoUuid}/pullrequests/${prId}`
  );
  
  const pr = await response.json();
  const targetBranch = pr.toRef.displayId;
  
  // Protected branches
  const protectedBranches = ['main', 'master', 'develop'];
  
  if (protectedBranches.includes(targetBranch)) {
    // Check for required approvals
    const approvals = await getApprovals(workspaceUuid, repoUuid, prId);
    
    if (approvals.approved === false) {
      return {
        success: false,
        message: `PR requires approval to merge into ${targetBranch}`
      };
    }
  }
  
  // Check for associated issues
  const hasIssueLink = await checkForIssueLink(pr.title, pr.description);
  
  if (!hasIssueLink) {
    console.warn(`No issue linked in PR #${prId}`);
  }
  
  return {
    success: true,
    message: 'All checks passed'
  };
};

const getApprovals = async (workspaceUuid, repoUuid, prId) => {
  const response = await api.asApp().requestBitbucket(
    `/2.0/repositories/${workspaceUuid}/${repoUuid}/pullrequests/${prId}/participants`
  );
  
  const participants = await response.json();
  return participants.find(p => p.approved === true);
};

const checkForIssueLink = async (title, description) => {
  // Check for issue patterns like PROJ-123 or #issue
  const issuePattern = /[A-Z]+-\d+/;
  
  if (!issuePattern.test(title) && !issuePattern.test(description)) {
    return false;
  }
  
  return true;
};
```

### Code Quality Validation

```javascript
// src/index.js - Code Quality Checks
export const checkFunction = async (event, context) => {
  const workspaceUuid = event.workspace.uuid;
  const repoUuid = event.repository.uuid;
  const prId = event.pullrequest.id;
  
  // Fetch PR details
  const response = await api.asApp().requestBitbucket(
    `/2.0/repositories/${workspaceUuid}/${repoUuid}/pullrequests/${prId}`
  );
  
  const pr = await response.json();
  const changes = pr.diff;
  
  // Check for debug statements
  if (changes.includes('console.log') || changes.includes('debugger')) {
    return {
      success: false,
      message: 'PR contains console.log or debugger statements'
    };
  }
  
  // Check for hardcoded secrets
  const secretPatterns = ['password=', 'secret=', 'api_key='];
  if (changes.match(new RegExp(secretPatterns.join('|'), 'i'))) {
    return {
      success: false,
      message: 'Potential hardcoded secret detected in PR'
    };
  }
  
  // Check file types for merge conflicts
  const changedFiles = pr.files || [];
  const largeFiles = changedFiles.filter(f => f.size > 1024 * 1024); // 1MB
  
  if (largeFiles.length > 5) {
    return {
      success: false,
      message: 'PR contains too many large files'
    };
  }
  
  return {
    success: true,
    message: 'Code quality checks passed'
  };
};
```

## Trigger Types

| Trigger | Description |
|---------|-------------|
| `on-code-pushed` | Runs when new commits are pushed to PR |
| `on-reviewer-status-changed` | Runs when reviewer status changes (Premium only) |
| `on-merge` | Runs when user attempts to merge PR |

