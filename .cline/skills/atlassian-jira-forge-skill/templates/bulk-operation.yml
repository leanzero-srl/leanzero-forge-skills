export const bulkTransitionHandler = async (event, context) => {
  console.log('Starting bulk status transition');
  
  try {
    // Find issues ready for transition
    const jql = 'status = "In Progress" AND assignee was User() -30d';
    const response = await rateLimitedRequest(
      '/rest/api/3/search',
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          jql,
          fields: ['id', 'key', 'status'],
          maxResults: 100
        })
      }
    );
    
    const data = await response.json();
    const issues = data.issues || [];
    
    console.log(`Found ${issues.length} issues to transition`);
    
    // Transition each issue to "Done"
    let successCount = 0;
    
    for (const issue of issues) {
      try {
        await rateLimitedRequest(
          `/rest/api/3/issue/${issue.id}/transitions`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              transition: { id: '71' } // Replace with actual transition ID
            })
          }
        );
        successCount++;
      } catch (error) {
        console.error(`Failed to transition ${issue.key}:`, error);
      }
    }
    
    return { 
      status: 'success', 
      transitionedCount: successCount,
      failedCount: issues.length - successCount
    };
    
  } catch (error) {
    console.error('Bulk transition error:', error);
    throw error;
  }
};
