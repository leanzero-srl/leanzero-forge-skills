# Jira Forge Bulk Operations Template

Copy this file and modify for your specific use case.

## File: manifest.yml (add to modules section)

```yaml
# Scheduled trigger for bulk operations
modules:
  scheduledTrigger:
    - key: bulk-update-trigger     # REQUIRED: Unique identifier
      function: 'bulkUpdateHandler' # REQUIRED: Function key reference
      interval: hour                # Run hourly, daily, or weekly
      
# Function module definition
function:
  - key: bulkUpdateHandler
    handler: index.bulkUpdateIssues

permissions:
  scopes:
    - read:jira-work        # View issues
    - write:jira-work       # Update issues
```

## File: src/index.js

```javascript
import api, { route } from '@forge/api';

/**
 * Bulk operations handler
 * Demonstrates patterns for processing large numbers of issues efficiently
 */

// Rate limiting configuration
const RATE_LIMIT = {
  MAX_REQUESTS_PER_SECOND: 5,
  BATCH_SIZE: 50,        // Jira's bulk endpoint limit
  REQUEST_TIMEOUT: 30000 // 30 second timeout
};

// Request tracking for rate limiting
let requestTimestamps = [];

/**
 * Main bulk update handler
 */
export const bulkUpdateHandler = async (event, context) => {
  console.log('Starting bulk operation');
  
  try {
    // Step 1: Fetch issues matching criteria
    const issues = await fetchIssuesForBatch();
    
    if (!issues || issues.length === 0) {
      console.log('No issues to process');
      return { status: 'success', processedCount: 0 };
    }
    
    console.log(`Found ${issues.length} issues to process`);
    
    // Step 2: Process in batches
    const results = await processInBatches(issues, RATE_LIMIT.BATCH_SIZE);
    
    return { 
      status: 'success', 
      processedCount: results.successful,
      failedCount: results.failed
    };
    
  } catch (error) {
    console.error('Bulk operation error:', error);
    throw error;
  }
};

/**
 * Fetch issues matching search criteria
 */
async function fetchIssuesForBatch() {
  const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000).toISOString();
  
  try {
    const response = await rateLimitedRequest(
      '/rest/api/3/search',
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          jql: `updated >= "${oneHourAgo}" AND status != Done`,
          fields: ['summary', 'status', 'assignee', 'priority'],
          maxResults: 100,
          startAt: 0
        })
      }
    );
    
    const data = await response.json();
    return data.issues || [];
    
  } catch (error) {
    console.error('Error fetching issues:', error);
    throw error;
  }
}

/**
 * Process issues in batches to avoid rate limits and timeouts
 */
async function processInBatches(issues, batchSize) {
  const results = { successful: 0, failed: 0 };
  
  for (let i = 0; i < issues.length; i += batchSize) {
    const batch = issues.slice(i, i + batchSize);
    const batchNumber = Math.floor(i / batchSize) + 1;
    
    console.log(`Processing batch ${batchNumber} of ${Math.ceil(issues.length / batchSize)}`);
    
    for (const issue of batch) {
      try {
        await processIssue(issue);
        results.successful++;
        console.log(`Successfully processed ${issue.key}`);
      } catch (error) {
        results.failed++;
        console.error(`Failed to process ${issue.key}:`, error.message);
        
        // Continue with next issue instead of failing entire batch
      }
      
      // Small delay between individual requests
      await sleep(200);
    }
    
    // Longer delay between batches
    if (i + batchSize < issues.length) {
      console.log('Waiting between batches...');
      await sleep(1000);
    }
  }
  
  return results;
}

/**
 * Process a single issue
 */
async function processIssue(issue) {
  // Example: Update priority based on status
  const updateData = buildUpdatePayload(issue);
  
  if (!updateData) {
    console.log(`No update needed for ${issue.key}`);
    return;
  }
  
  await rateLimitedRequest(
    `/rest/api/3/issue/${issue.id}`,
    {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields: updateData })
    }
  );
}

/**
 * Build update payload based on issue data
 */
function buildUpdatePayload(issue) {
  const updates = {};
  
  // Example business logic: adjust priority for high-priority unresolved issues
  if (issue.fields.priority?.name === 'High' && 
      issue.fields.status?.name !== 'Done') {
    // Add comment to track the update
    return {
      comment: {
        add: {
          body: {
            type: 'doc',
            version: 1,
            content: [{
              type: 'paragraph',
              content: [{
                type: 'text',
                text: '[Automated] Priority review scheduled'
              }]
            }]
          }
        }
      }
    };
  }
  
  return null; // No update needed
}

/**
 * Rate-limited API request helper
 */
async function rateLimitedRequest(endpoint, options = {}) {
  const now = Date.now();
  
  // Remove old timestamps (older than 1 second)
  requestTimestamps = requestTimestamps.filter(ts => now - ts < 1000);
  
  // Wait if we've reached the limit
  while (requestTimestamps.length >= RATE_LIMIT.MAX_REQUESTS_PER_SECOND) {
    const oldestRequest = Math.min(...requestTimestamps);
    const waitTime = 1000 - (now - oldestRequest);
    
    console.log(`Rate limit approaching, waiting ${waitTime}ms`);
    await sleep(waitTime);
  }
  
  // Record this request
  requestTimestamps.push(now);
  
  try {
    const response = await api.asApp().requestJira(
      route`${endpoint}`,
      options
    );
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${await response.text()}`);
    }
    
    return response;
    
  } catch (error) {
    console.error(`Request failed for ${endpoint}:`, error);
    throw error;
  }
}

/**
 * Sleep helper
 */
function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

