## Key Points About Bulk Operations

### Best Practices

| Practice | Why It Matters |
|----------|----------------|
| **Process in batches** | Avoid timeouts and rate limits |
| **Rate limit requests** | Stay within Jira's API limits (5 req/sec default) |
| **Handle individual failures gracefully** | One failure shouldn't stop the entire batch |
| **Log extensively** | Debug issues and track progress |
| **Use bulk endpoints when available** | More efficient than individual calls |

### Available Bulk Endpoints

| Endpoint | Method | Purpose |
|----------|--------|---------|
| `/rest/api/3/issue/bulk` | POST | Create multiple issues at once (max 50) |
| `/rest/api/3/issue/{id}/transitions` | POST | Transition an issue |

### Common Use Cases

1. **Automated cleanup** - Archive old or stale issues
2. **Bulk field updates** - Apply changes across many issues
3. **Status transitions** - Move issues through workflow automatically
4. **Data migration** - Import and process external data in batches
5. **Report generation** - Collect data from many issues for reporting

### Error Handling Strategy

```javascript
try {
  await processIssue(issue);
} catch (error) {
  // Log error but continue with next issue
  console.error(`Failed ${issue.key}:`, error.message);
  
  // Optionally: store failed items for retry
  const failures = await kvs.get('failed_items') || [];
  failures.push({ key: issue.key, error: error.message });
  await kvs.set('failed_items', JSON.stringify(failures));
}
```

### Testing Bulk Operations

1. **Start small** - Test with 1-2 issues first
2. **Use dry-run mode** - Log what would happen without making changes
3. **Monitor logs** - Watch `forge logs` during execution
4. **Check rate limits** - Look for 429 errors in output

