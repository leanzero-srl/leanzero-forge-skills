export const bulkCreateHandler = async (event, context) => {
  console.log('Starting bulk issue creation');
  
  try {
    // Example: Create issues from a list
    const issuesToCreate = [
      { summary: 'Task 1', projectKey: 'PROJ' },
      { summary: 'Task 2', projectKey: 'PROJ' },
      // ... more issues
    ];
    
    const results = await createIssuesInBatch(issuesToCreate);
    
    return { 
      status: 'success', 
      createdCount: results.created,
      failedCount: results.failed
    };
    
  } catch (error) {
    console.error('Bulk creation error:', error);
    throw error;
  }
};

async function createIssuesInBatch(issuesToCreate) {
  const batchSize = 50; // Jira bulk limit
  const results = { created: 0, failed: 0 };
  
  for (let i = 0; i < issuesToCreate.length; i += batchSize) {
    const batch = issuesToCreate.slice(i, i + batchSize);
    
    try {
      const response = await rateLimitedRequest(
        '/rest/api/3/issue/bulk',
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            issueUpdates: batch.map(issue => ({
              fields: {
                summary: issue.summary,
                description: issue.description || '',
                issuetype: { name: issue.issueType || 'Task' },
                project: { key: issue.projectKey }
              }
            }))
          })
        }
      );
      
      results.created += batch.length;
      console.log(`Created ${batch.length} issues in batch`);
      
    } catch (error) {
      console.error('Batch creation error:', error);
      results.failed += batch.length;
    }
  }
  
  return results;
}

