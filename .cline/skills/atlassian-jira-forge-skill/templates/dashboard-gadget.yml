## Dashboard Context Information

```javascript
import { view } from '@forge/bridge';

export const getDashboardContext = async () => {
  const context = await view.getContext();
  
  return {
    gadgetId: context.extension.gadget.id,
    dashboardId: context.extension.dashboard.id,
    type: context.extension.type, // 'gadget'
    location: context.extension.location
  };
};
```

## Common Use Cases

### 1. Issue Count Gadget

```javascript
resolver.define('getIssueCounts', async (req) => {
  const { projectKey, issueTypes } = req.payload;
  
  const jqlParts = [`project=${projectKey}`];
  if (issueTypes && issueTypes.length > 0) {
    jqlParts.push(`issuetype in (${issueTypes.join(',')})`);
  }
  
  const response = await api.asApp().requestJira(
    `/rest/api/3/search?jql=${encodeURIComponent(jqlParts.join(' AND '))}&maxResults=0`,
    { method: 'GET' }
  );
  
  return await response.json();
});
```

### 2. Recent Activity Gadget

```javascript
resolver.define('getRecentActivity', async (req) => {
  const { projectKey, maxResults = 10 } = req.payload;
  
  const response = await api.asApp().requestJira(
    `/rest/api/3/search?jql=project=${projectKey} ORDER BY updated DESC&maxResults=${maxResults}&fields=key,summary,updated,assignee`,
    { method: 'GET' }
  );
  
  return await response.json();
});
```

### 3. Personal Statistics Gadget

```javascript
resolver.define('getPersonalStats', async (req) => {
  const context = req.context;
  const accountId = context.accountId;
  
  // Get issues assigned to current user
  const response = await api.asApp().requestJira(
    `/rest/api/3/search?jql=assignee=${accountId}&maxResults=0`,
    { method: 'GET' }
  );
  
  return await response.json();
});
```

## Important Notes

1. **Dashboard Context**: Gadgets run in the context of a dashboard, access via `view.getContext()`
2. **Refresh Behavior**: Override default refresh using `JIRA_DASHBOARD_GADGET_REFRESH` event
3. **Configuration Storage**: Use Forge Storage for persistent gadget preferences
4. **Error Handling**: Always handle errors gracefully and show user-friendly messages

