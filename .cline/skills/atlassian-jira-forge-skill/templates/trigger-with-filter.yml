## Common Use Cases

### 1. Auto-assign Issues Based on Label

```yaml
modules:
  trigger:
    - key: auto-assign-trigger
      function: autoAssignFunction
      events:
        - avi:jira:created:issue
      filter:
        ignoreSelf: true
        expression: event.issue.fields?.labels?.some(l => l === 'support')

function:
  - key: autoAssignFunction
    handler: index.run

permissions:
  scopes:
    - 'read:jira-work'
    - 'write:jira-work'
```

```javascript
// src/index.js - Auto-assign logic
export const autoAssignFunction = async (event, context) => {
  const labels = event.issue.fields?.labels || [];
  
  if (!labels.includes('support')) {
    return { status: 'no-label' };
  }
  
  // Assign to support team member
  await api.asApp().requestJira(
    `/rest/api/3/issue/${event.issue.key}`,
    {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        fields: {
          assignee: {
            accountId: 'support-team-account-id'
          }
        }
      })
    }
  );
  
  return { status: 'assigned', issueKey: event.issue.key };
};
```

### 2. Validate Issue on Creation

```yaml
modules:
  trigger:
    - key: validation-trigger
      function: validateFunction
      events:
        - avi:jira:created:issue
      filter:
        ignoreSelf: true
        expression: event.issue.fields?.issuetype.name == 'Bug'

function:
  - key: validateFunction
    handler: index.run

permissions:
  scopes:
    - 'read:jira-work'
```

```javascript
// src/index.js - Validation logic
export const validateFunction = async (event, context) => {
  const issueKey = event.issue.key;
  const description = event.issue.fields?.description || '';
  
  // Validate that description has minimum length
  if (description.length < 10) {
    console.log(`Short description on ${issueKey}, adding warning`);
    
    await api.asApp().requestJira(
      `/rest/api/3/issue/${issueKey}/comment`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          body: {
            type: 'doc',
            version: 1,
            content: [{
              type: 'panel',
              content: [{
                type: 'text',
                text: 'Warning: Description appears to be very short.'
              }],
              style: 'warning'
            }]
          }
        })
      }
    );
  }
  
  return { status: 'validated', issueKey };
};
```

### 3. Sync Issue Data to External System

```yaml
modules:
  trigger:
    - key: sync-trigger
      function: syncFunction
      events:
        - avi:jira:created:issue
      filter:
        ignoreSelf: true
        expression: event.issue.fields?.project.key in ['PROJ1', 'PROJ2']

function:
  - key: syncFunction
    handler: index.run

permissions:
  scopes:
    - 'read:jira-work'
```

```javascript
// src/index.js - External sync logic
export const syncFunction = async (event, context) => {
  const { issue } = event;
  
  // Prepare data for external system
  const syncData = {
    issueKey: issue.key,
    summary: issue.fields.summary,
    description: issue.fields.description,
    projectKey: issue.fields.project.key,
    createdAt: issue.created
  };
  
  try {
    // Send to external API
    await api.asApp().requestExternal(
      'https://external-system.com/api/issues',
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(syncData)
      }
    );
    
    console.log(`Synced issue ${issue.key} to external system`);
  } catch (error) {
    console.error('Failed to sync issue:', error);
    throw error;
  }
  
  return { status: 'synced', issueKey: issue.key };
};
```

## Troubleshooting

| Issue | Cause | Solution |
|-------|-------|----------|
| Trigger not firing | Event type mismatch | Verify event name matches Atlassian documentation |
| Filter expression error | Syntax error in expression | Use simple expressions first, test incrementally |
| Function timeout | Long-running operations | Optimize logic or use scheduled trigger instead |

## Important Notes

1. **Event Delivery**: Triggers may have up to 3-minute delay
2. **Rate Limits**: Follow platform invocation limits
3. **Testing**: Use tunneling for real-time testing of triggers
4. **Logging**: Always log events for debugging purposes
5. **Error Handling**: Re-throw errors to indicate failure

