# Event Trigger Template with Filtering

## Overview
This template demonstrates how to use Forge triggers to listen for Atlassian app events and apply filtering logic.

## Basic Trigger Structure

```yaml
modules:
  trigger:
    - key: issue-created-trigger
      function: issueCreatedFunction
      events:
        - avi:jira:created:issue

function:
  - key: issueCreatedFunction
    handler: index.run

permissions:
  scopes:
    - 'read:jira-work'
```

## Trigger with Self-Event Filtering

```yaml
modules:
  trigger:
    - key: issue-updated-trigger
      function: issueUpdatedFunction
      events:
        - avi:jira:updated:issue
      filter:
        ignoreSelf: true  # Ignore self-generated events

function:
  - key: issueUpdatedFunction
    handler: index.run

permissions:
  scopes:
    - 'read:jira-work'
```

## Trigger with Expression Filtering

```yaml
modules:
  trigger:
    - key: project-specific-trigger
      function: projectSpecificTrigger
      events:
        - avi:jira:created:issue
      filter:
        expression: event.issue.fields?.project.key == 'PROJ'

function:
  - key: projectSpecificTrigger
    handler: index.run

permissions:
  scopes:
    - 'read:jira-work'
```

## Combined Filtering (ignoreSelf + Expression)

```yaml
modules:
  trigger:
    - key: complex-filter-trigger
      function: complexFilterFunction
      events:
        - avi:jira:created:issue
      filter:
        ignoreSelf: true
        expression: |
          event.issue.fields?.project.key == 'PROJ' && 
          event.issue.fields?.issuetype.name == 'Bug'

function:
  - key: complexFilterFunction
    handler: index.run

permissions:
  scopes:
    - 'read:jira-work'
```

## Error Handling with onError Configuration

```yaml
modules:
  trigger:
    - key: trigger-with-error-handling
      function: mainFunction
      events:
        - avi:jira:created:issue
      filter:
        ignoreSelf: true
        expression: event.issue.fields?.project.key == 'PROJ'
        onError: RECEIVE_AND_LOG  # Also invoke the function with error details

function:
  - key: mainFunction
    handler: index.run

permissions:
  scopes:
    - 'read:jira-work'
```

## Function Implementation Examples

### Basic Event Handler

```javascript
// src/index.js - Basic Trigger Handler
export const issueCreatedFunction = async (event, context) => {
  console.log('Issue created event received:', JSON.stringify(event, null, 2));
  
  try {
    const issueKey = event.issue.key;
    const projectKey = event.issue.fields.project.key;
    
    // Process the created issue
    await processNewIssue(issueKey, projectKey);
    
    return { status: 'success' };
  } catch (error) {
    console.error('Error processing issue:', error);
    throw error;
  }
};

const processNewIssue = async (issueKey, projectKey) => {
  // Example: Add a comment to new issues
  const api = require('@forge/api');
  
  await api.asApp().requestJira(
    `/rest/api/3/issue/${issueKey}/comment`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        body: {
          type: 'doc',
          version: 1,
          content: [{
            type: 'paragraph',
            content: [{
              type: 'text',
              text: `New issue created in ${projectKey}: ${issueKey}`
            }]
          }]
        }
      })
    }
  );
};
```

### Filter Expression Implementation

```javascript
// src/index.js - Trigger with Filtering Logic
export const projectSpecificTrigger = async (event, context) => {
  // Check if event should be processed based on filter expression
  const projectKey = event.issue.fields?.project?.key;
  
  if (projectKey !== 'PROJ') {
    console.log(`Skipping event for project: ${projectKey}`);
    return { status: 'skipped' };
  }
  
  console.log(`Processing issue in project PROJ: ${event.issue.key}`);
  
  // Process the issue
  await processIssue(event.issue);
  
  return { status: 'processed' };
};

const processIssue = async (issue) => {
  const api = require('@forge/api');
  
  // Example: Add a label to issues in specific project
  await api.asApp().requestJira(
    `/rest/api/3/issue/${issue.key}`,
    {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        update: {
          labels: [{
            add: 'project-specific'
          }]
        }
      })
    }
  );
};
```

### Complex Filtering Logic

```javascript
// src/index.js - Complex Filter Implementation
export const complexFilterFunction = async (event, context) => {
  const issueType = event.issue.fields?.issuetype?.name;
  const projectKey = event.issue.fields?.project?.key;
  
  // Apply complex filtering logic
  const shouldProcess = 
    projectKey === 'PROJ' && 
    issueType === 'Bug';
  
  if (!shouldProcess) {
    console.log(`Filter match: ${issueType} in ${projectKey}`);
    return { status: 'filtered', reason: 'does not match criteria' };
  }
  
  // Process matching issues
  await processMatchingIssue(event.issue);
  
  return { status: 'matched', issueKey: event.issue.key };
};

const processMatchingIssue = async (issue) => {
  console.log(`Processing bug in PROJ: ${issue.key}`);
  // Your logic here
};
```

### Error Handling with onError RECEIVE

```javascript
// src/index.js - Error Handling Implementation
export const mainFunction = async (event, context) => {
  try {
    // Apply filter expression
    if (!shouldProcessEvent(event)) {
      console.log('Filter did not match');
      return { status: 'filtered' };
    }
    
    // Process event
    await processEvent(event);
    
    return { status: 'success' };
  } catch (error) {
    // If onError is RECEIVE or RECEIVE_AND_LOG, error details are in event
    if (event.errorDetails) {
      console.error('Expression evaluation error:', error);
    }
    
    throw error;
  }
};

const shouldProcessEvent = (event) => {
  try {
    return event.issue.fields?.project?.key === 'PROJ';
  } catch (e) {
    return false;
  }
};

const processEvent = async (event) => {
  // Process the event
};
```

## Available Trigger Events

### Jira Events

| Event | Description |
|-------|-------------|
| `avi:jira:created:issue` | Issue created |
| `avi:jira:updated:issue` | Issue updated |
| `avi:jira:deleted:issue` | Issue deleted |
| `avi:jira:comment_created` | Comment added |
| `avi:jira:comment_updated` | Comment updated |
| `avi:jira:worklog_created` | Worklog created |
| `avi:jira:worklog_updated` | Worklog updated |

### Confluence Events

| Event | Description |
|-------|-------------|
| `avi:confluence:created:page` | Page created |
| `avi:confluence:updated:page` | Page updated |
| `avi:confluence:created:blogpost` | Blog post created |

