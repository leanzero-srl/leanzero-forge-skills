## Key Points About Forge Storage (KVS)

### Storage Limits
| Resource | Limit |
|----------|-------|
| **Total storage per app** | 10 MB |
| **Maximum key size** | 400 bytes |
| **Maximum value size** | 1 MB |
| **List operations** | Returns up to 1000 keys |

### Common Patterns

#### 1. Configuration Storage
Store user settings, API keys (encrypted), webhook URLs:
```javascript
await kvs.set('config.api_key', JSON.stringify(apiKey));
const apiKey = await kvs.get('config.api_key');
```

#### 2. State Tracking
Track last sync time, processing state, counters:
```javascript
await kvs.set('sync:last_run', Date.now().toString());
```

#### 3. Cache External Data
Cache API responses to reduce rate limit issues:
```javascript
const CACHE_TTL = 5 * 60 * 1000; // 5 minutes

async function getCachedData(key, fetchFn) {
  const cached = await kvs.get(`cache:${key}`);
  
  if (cached) {
    const { data, timestamp } = JSON.parse(cached);
    if (Date.now() - timestamp < CACHE_TTL) {
      return data; // Return cached data
    }
  }
  
  const freshData = await fetchFn();
  await kvs.set(`cache:${key}`, JSON.stringify({ 
    data: freshData, 
    timestamp: Date.now() 
  }));
  
  return freshData;
}
```

### Important Notes
- **No automatic expiration** - implement your own TTL logic if needed
- **Keys are app-scoped** - each app has isolated storage
- **List operations** may be paginated for large key sets
- **Store strings only** - serialize objects with `JSON.stringify()`
- **Handle errors gracefully** - KVS operations can fail

### Cleanup Best Practices
1. Clean up orphan entries when configuration changes
2. Implement periodic cleanup scheduled triggers
3. Delete old cache entries based on TTL

