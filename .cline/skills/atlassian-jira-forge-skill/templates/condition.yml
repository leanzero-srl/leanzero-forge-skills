# Jira Workflow Condition Template

Copy this file and modify for your specific use case.

## File: manifest.yml (add to modules section)

```yaml
modules:
  jira:workflowCondition:
    - key: my-condition               # REQUIRED: Unique identifier
      name: My Condition              # REQUIRED: Display name
      description: Controls visibility  # REQUIRED: Description
      
      function: checkMyCondition      # Function handler (or use expression)
      # expression: issue.fields.status.name == 'Open'  # OR: Use Jira expression
      
      projectTypes:
        - company-managed
        - team-managed
        
      create:
        resource: condition-config-ui   # Required for configuration UI
```

## File: src/index.js

```javascript
export const checkMyCondition = async (args) => {
  const { issue, configuration, context } = args;
  
  console.log('Checking condition for issue:', issue.key);
  console.log('Issue status:', issue.fields.status?.name);
  
  // Configuration contains user's saved settings
  const allowedStatuses = configuration.allowedStatuses || [];
  const requireLicense = configuration.requireLicense || false;
  
  try {
    // Example 1: Check issue field value
    if (issue.fields.status?.name === 'Done') {
      return { result: true };  // Show transition
    }
    
    // Example 2: Check license status (for licensed apps)
    if (requireLicense) {
      const isActive = context.license?.isActive === true;
      if (!isActive) {
        return { result: false };  // Hide transition
      }
    }
    
    // Example 3: Check user permissions
    const userContext = await getUserContext();
    if (userContext.role === 'manager') {
      return { result: true };
    }
    
    return { result: false };  // Default: hide transition
    
  } catch (error) {
    console.error('Condition check error:', error);
    return { result: false };  // Hide on error
  }
};

// Helper function to get user context
async function getUserContext() {
  try {
    const bridge = require('@forge/bridge').bridge;
    const context = await bridge.getContext();
    
    return {
      accountId: context.accountId,
      role: context.role || 'user'
    };
  } catch (error) {
    console.error('Error getting user context:', error);
    return { accountId: null, role: 'unknown' };
  }
}
```

## File: src/Configure.js (Optional - for custom configuration UI)

```javascript
import React from 'react';
import { Form, Select, Checkbox } from '@forge/bridge';

export const Configure = () => {
  const [allowedStatuses, setAllowedStatuses] = React.useState([]);
  const [requireLicense, setRequireLicense] = React.useState(false);
  
  // Status options for dropdown
  const statusOptions = [
    { label: 'Open', value: 'Open' },
    { label: 'In Progress', value: 'In Progress' },
    { label: 'Done', value: 'Done' }
  ];
  
  return (
    <Form>
      <Select
        label="Allowed Statuses"
        options={statusOptions}
        multiple={true}
        value={allowedStatuses}
        onChange={(e) => setAllowedStatuses(e.target.value)}
      />
      
      <Checkbox
        label="Require Active License"
        checked={requireLicense}
        onChange={(e) => setRequireLicense(e.target.checked)}
      />
    </Form>
  );
};

// Save configuration function
export const onSaveConfiguration = async () => {
  const config = {
    allowedStatuses: document.getElementById('allowed-statuses').value,
    requireLicense: document.getElementById('require-license').checked,
    enabled: true
  };
  
  return JSON.stringify(config);
};
```

## Permissions Required

```yaml
permissions:
  scopes:
    - read:jira-work        # View issue data
    - read:user:jira        # View user information (if needed)
    - storage:app           # Access app storage (if needed)
```

## Common Use Cases

### Hide Transitions for Non-Managers

```javascript
export const checkManagerPermission = async (args) => {
  const { context } = args;
  
  // Check if user has manager role
  const hasManagerRole = context.groups?.includes('jira-managers');
  
  return { result: hasManagerRole };
};
```

### Show Only for Specific Project Types

```javascript
export const checkProjectType = async (args) => {
  const { issue } = args;
  
  // Check if project matches allowed types
  const allowedProjectTypes = ['software', 'service'];
  const projectType = issue.fields.project.scheme?.type;
  
  return { result: allowedProjectTypes.includes(projectType) };
};
```

### Conditional Visibility Based on Issue Fields

```javascript
export const checkIssueFields = async (args) => {
  const { issue, configuration } = args;
  
  // Only show if required fields are filled
  const requiredField = issue.fields[configuration.requiredFieldId];
  
  return { result: !!requiredField };
};
```

## Key Points

- **Return format**: `{ result: true }` to show, `{ result: false }` to hide
- Conditions run before UI renders (transition won't appear if false)
- Use `context.license.isActive` for license-based conditions
- Handle errors gracefully by returning `{ result: false }`